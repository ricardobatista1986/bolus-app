/* ── DASHBOARD MODAL (Camada 3) ───────────────────────────────────────── */
function DashboardModal({open, onClose}) {
  const {dark} = useContext(ThemeCtx);
  const [tab,     setTab]     = React.useState('stats');   // 'stats' | 'pred'
  const [period,  setPeriod]  = React.useState(14);        // dias para aba stats

  // ── Estado aba Previsões
  const [predData,  setPredData]  = React.useState(null);
  const [predLoad,  setPredLoad]  = React.useState(false);
  const [predErr,   setPredErr]   = React.useState(null);

  // ── Estado aba Estatísticas
  const [glStats,  setGlStats]  = React.useState(null);
  const [glLoad,   setGlLoad]   = React.useState(false);
  const [glErr,    setGlErr]    = React.useState(null);
  // Cache por período para não refetch ao trocar de aba
  const glCache = React.useRef({});

  const headers = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };

  // ── Fetch previsões (uma vez ao abrir)
  React.useEffect(()=>{
    if(!open || predData) return;
    setPredLoad(true); setPredErr(null);
    (async()=>{
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/prediction_validations?select=t30_err,t60_err,t90_err,base_glucose&t30_actual=not.is.null&limit=2000`,
          { headers }
        );
        if(!res.ok) throw new Error('Supabase indisponível');
        const rows = await res.json();
        if(!rows.length){ setPredData({total:0}); return; }
        const calc = (arr, field) => {
          const v = arr.map(r=>r[field]).filter(x=>x!=null);
          if(!v.length) return null;
          const mae  = +(v.reduce((s,x)=>s+Math.abs(x),0)/v.length).toFixed(1);
          const bias = +(v.reduce((s,x)=>s+x,0)/v.length).toFixed(1);
          const p20  = Math.round(100*v.filter(x=>Math.abs(x)<=20).length/v.length);
          return {mae,bias,p20,n:v.length};
        };
        const byZone = {};
        for(const r of rows){
          const z = r.base_glucose>=180?'hiper':r.base_glucose<70?'hipo':'alvo';
          if(!byZone[z]) byZone[z]=[];
          byZone[z].push(r);
        }
        setPredData({
          total: rows.length,
          t30: calc(rows,'t30_err'), t60: calc(rows,'t60_err'), t90: calc(rows,'t90_err'),
          zones: Object.entries(byZone).map(([z,zr])=>({
            zona:z, n:zr.length,
            t30:calc(zr,'t30_err'), t60:calc(zr,'t60_err'), t90:calc(zr,'t90_err'),
          })),
        });
      } catch(e){ setPredErr(e.message); }
      finally{ setPredLoad(false); }
    })();
  },[open]);

  // ── Fetch estatísticas de glicemia (recarrega ao mudar período, com cache)
  React.useEffect(()=>{
    if(!open || tab!=='stats') return;
    // Usa cache se já buscou este período
    if(glCache.current[period]){ setGlStats(glCache.current[period]); return; }
    setGlLoad(true); setGlErr(null); setGlStats(null);
    (async()=>{
      try {
        const since = new Date(Date.now() - period*24*3600000).toISOString();
        // Busca value + captured_at para calcular episódios
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/glucose_readings?select=value,captured_at&captured_at=gte.${since}&order=captured_at.asc&limit=8000`,
          { headers }
        );
        if(!res.ok) throw new Error('Supabase indisponível');
        const rows = await res.json();
        const sorted = rows
          .filter(r=>r.value>=40&&r.value<=400)
          .sort((a,b)=>new Date(a.captured_at)-new Date(b.captured_at));
        if(!sorted.length){ const s={n:0}; glCache.current[period]=s; setGlStats(s); return; }

        const vals = sorted.map(r=>r.value);
        const n    = vals.length;
        const avg  = vals.reduce((s,v)=>s+v,0)/n;
        const sd   = Math.sqrt(vals.reduce((s,v)=>s+(v-avg)**2,0)/n);
        const cv   = (sd/avg)*100;
        const a1c  = 3.31 + 0.02392*avg; // GMI fórmula
        const inR  = vals.filter(v=>v>=70&&v<=180).length;
        const abR  = vals.filter(v=>v>180).length;
        const blR  = vals.filter(v=>v<70).length;

        // ── AGP metrics (padrão ambulatorial)
        const tbr54 = vals.filter(v=>v<54).length;   // hipo nível 2 — severa
        const tar250= vals.filter(v=>v>250).length;  // hiper nível 2 — severa
        const titrN = vals.filter(v=>v>=70&&v<=140).length; // faixa rígida

        const s = {
          n, avg:+avg.toFixed(1), sd:+sd.toFixed(1), cv:+cv.toFixed(1), a1c:+a1c.toFixed(2),
          tir:+(inR/n*100).toFixed(1), tar:+(abR/n*100).toFixed(1), tbr:+(blR/n*100).toFixed(1),
          tbr54:+(tbr54/n*100).toFixed(1),
          tar250:+(tar250/n*100).toFixed(1),
          titr:+(titrN/n*100).toFixed(1),
        };
        glCache.current[period] = s;
        setGlStats(s);
      } catch(e){ setGlErr(e.message); }
      finally{ setGlLoad(false); }
    })();
  },[open, tab, period]);

  // Reset cache ao fechar para sempre buscar dados frescos no próximo open
  React.useEffect(()=>{ if(!open) glCache.current={}; },[open]);

  if(!open) return null;
  const ov = {position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'};
  const sh = {background:'var(--surface)',borderRadius:'20px 20px 0 0',width:'100%',maxWidth:480,maxHeight:'90vh',overflowY:'auto',padding:'20px 18px 36px'};

  // ── Componentes visuais
  const BiasTag = ({v}) => {
    if(v==null) return null;
    const col = Math.abs(v)<=5?'var(--green)':Math.abs(v)<=15?'var(--amber)':'#ef4444';
    return <span style={{fontSize:'11px',padding:'2px 6px',borderRadius:'4px',background:`${col}20`,color:col,fontWeight:700}}>{v>0?'+':''}{v}</span>;
  };
  const MaeBar = ({v,max=80}) => {
    if(v==null) return null;
    const pct = Math.min(100,v/max*100);
    const col = v<=30?'var(--green)':v<=55?'var(--amber)':'#ef4444';
    return (
      <div style={{display:'flex',alignItems:'center',gap:6}}>
        <div style={{flex:1,height:6,background:'var(--surface2)',borderRadius:3,overflow:'hidden'}}>
          <div style={{width:`${pct}%`,height:'100%',background:col,borderRadius:3,transition:'width .4s'}}/>
        </div>
        <span style={{fontSize:'12px',fontWeight:700,color:col,minWidth:30}}>{v}</span>
      </div>
    );
  };
  const P20Tag = ({v}) => {
    if(v==null) return null;
    const col = v>=70?'var(--green)':v>=50?'var(--amber)':'#ef4444';
    return <span style={{fontSize:'12px',fontWeight:700,color:col}}>{v}%</span>;
  };

  // ── Donut SVG — math correta com transform rotate(-90)
  const TirDonut = ({tir,tar,tbr}) => {
    const R=56, cx=72, cy=72, sw=15;
    const circ = 2*Math.PI*R;
    const gap  = 0.007; // pequeno gap entre segmentos
    const segs = [
      {pct:tir/100, col:'#22c55e'},
      {pct:tar/100, col:'#f97316'},
      {pct:tbr/100, col:'#ef4444'},
    ];
    let cum = 0; // acumula offset
    return (
      <svg width={144} height={144}>
        {/* trilha de fundo */}
        <circle cx={cx} cy={cy} r={R} fill="none" stroke="var(--surface2)" strokeWidth={sw}/>
        {segs.map((s,i)=>{
          const startAt = cum;
          cum += s.pct;
          const dashLen = Math.max(0,(s.pct - gap)) * circ;
          // rotate(-90) move ponto inicial para 12h; offset acumulado desloca para posição correta
          return (
            <circle key={i} cx={cx} cy={cy} r={R} fill="none"
              stroke={s.col} strokeWidth={sw}
              strokeDasharray={`${dashLen} ${circ - dashLen}`}
              strokeDashoffset={-startAt * circ}
              transform={`rotate(-90 ${cx} ${cy})`}
              style={{transition:'stroke-dasharray .5s'}}/>
          );
        })}
        <text x={cx} y={cy-7}  textAnchor="middle" fill="var(--text)"  fontSize="22" fontWeight="800" fontFamily="var(--font)">{tir}%</text>
        <text x={cx} y={cx+11} textAnchor="middle" fill="var(--text2)" fontSize="11" fontFamily="var(--font)">Na faixa</text>
      </svg>
    );
  };

  const StatCard = ({label,value,unit,sub,col}) => (
    <div style={{background:'var(--surface2)',borderRadius:12,padding:'12px 14px'}}>
      <div style={{fontSize:'11px',color:'var(--text3)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.4px'}}>{label}</div>
      <div style={{display:'flex',alignItems:'baseline',gap:4}}>
        <span style={{fontSize:'24px',fontWeight:800,color:col||'var(--text)'}}>{value}</span>
        {unit && <span style={{fontSize:'13px',color:'var(--text2)'}}>{unit}</span>}
      </div>
      {sub && <div style={{fontSize:'11px',color:'var(--text3)',marginTop:2}}>{sub}</div>}
    </div>
  );

  const zoneLabel = {hiper:{label:'Hiper ≥180',col:'#f59e0b'},alvo:{label:'Alvo 70–179',col:'var(--green)'},hipo:{label:'Hipo <70',col:'#ef4444'}};
  const horizons  = [{t:'t30',label:'+30min'},{t:'t60',label:'+60min'},{t:'t90',label:'+90min'}];

  return (
    <div style={ov} onClick={onClose}>
      <div style={sh} onClick={e=>e.stopPropagation()}>

        {/* ── Header */}
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <IcoBarChart s={17} c="var(--accent)"/>
            <span style={{fontWeight:700,fontSize:'16px',color:'var(--text)'}}>Análise</span>
          </div>
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',padding:4}}><IcoX s={18} c="var(--text2)"/></button>
        </div>

        {/* ── Tabs */}

            </button>
          ))}
        </div>

        {/* ══════════════════════════════

        ══════════════════════════════ */}
        {tab==='stats' && (
          <>
            {/* Seletor de período */}
            <div style={{display:'flex',gap:6,marginBottom:18,justifyContent:'center'}}>
              {[{d:7,l:'7 dias'},{d:14,l:'14 dias'},{d:30,l:'30 dias'},{d:90,l:'90 dias'}].map(({d,l})=>(
                <button key={d} onClick={()=>setPeriod(d)}
                  style={{padding:'5px 12px',borderRadius:20,border:'1px solid',cursor:'pointer',
                    fontSize:'12px',fontWeight:600,fontFamily:'var(--font)',
                    background:period===d?'var(--accent)':'var(--surface2)',
                    color:period===d?'white':'var(--text2)',
                    borderColor:period===d?'var(--accent)':'var(--border)'}}>
                  {l}
                </button>
              ))}
            </div>

            {glLoad && <div style={{textAlign:'center',padding:'40px 0',color:'var(--text2)'}}>Carregando…</div>}
            {glErr  && <div style={{textAlign:'center',padding:'20px 0',color:'#ef4444',fontSize:'13px'}}>{glErr}</div>}

            {glStats && glStats.n > 0 && (
              <>
                {/* Donut + legenda — donut centralizado, legenda em linha abaixo */}
                <div style={{background:'var(--surface2)',borderRadius:14,padding:'16px',marginBottom:14}}>
                  <div style={{fontSize:'12px',fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.4px',marginBottom:12}}>
                    Tempo na Faixa
                  </div>
                  {/* donut centralizado */}
                  <div style={{display:'flex',justifyContent:'center',marginBottom:16}}>
                    <TirDonut tir={glStats.tir} tar={glStats.tar} tbr={glStats.tbr}/>
                  </div>
                  {/* legenda em 3 colunas abaixo do donut */}
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,textAlign:'center'}}>
                    {[
                      {col:'#22c55e',label:'Na faixa',    pct:glStats.tir},
                      {col:'#f97316',label:'Acima >180',  pct:glStats.tar},
                      {col:'#ef4444',label:'Abaixo <70',  pct:glStats.tbr},
                    ].map(({col,label,pct})=>(
                      <div key={label}>
                        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:5,marginBottom:3}}>
                          <div style={{width:9,height:9,borderRadius:'50%',background:col,flexShrink:0}}/>
                          <span style={{fontSize:'11px',color:'var(--text2)'}}>{label}</span>
                        </div>
                        <span style={{fontSize:'16px',fontWeight:800,color:'var(--text)'}}>{pct}%</span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Grid de métricas 2×2 — padrão AGP */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
                  <StatCard label="Glicemia Média" value={glStats.avg} unit="mg/dL"
                    col={glStats.avg>180?'#f59e0b':glStats.avg<70?'#ef4444':'var(--text)'}/>
                  <StatCard label="HbA1c estimada" value={glStats.a1c} unit="%"
                    sub="GMI: 3.31 + 0.02392×avg"
                    col={glStats.a1c>=8?'#ef4444':glStats.a1c>=7?'#f59e0b':'var(--green)'}/>
                  <StatCard label="Hipo severa <54" value={glStats.tbr54} unit="%"
                    sub="meta: <1%"
                    col={glStats.tbr54>=1?'#ef4444':glStats.tbr54>=0.5?'#f59e0b':'var(--green)'}/>
                  <StatCard label="Hiper severa >250" value={glStats.tar250} unit="%"
                    sub="meta: <5%"
                    col={glStats.tar250>=5?'#ef4444':glStats.tar250>=2?'#f59e0b':'var(--green)'}/>
                  <StatCard label="Coef. Variação" value={glStats.cv} unit="%"
                    sub="meta: <36%"
                    col={glStats.cv>=36?'#ef4444':glStats.cv>=33?'#f59e0b':'var(--green)'}/>
                  <StatCard label="Faixa rígida" value={glStats.titr} unit="%"
                    sub="70–140 mg/dL · meta: >50%"
                    col={glStats.titr<35?'#ef4444':glStats.titr<50?'#f59e0b':'var(--green)'}/>
                </div>

                <div style={{fontSize:'11px',color:'var(--text3)',marginTop:6}}>
                  {glStats.n.toLocaleString()} leituras · {period} dias
                </div>
              </>
            )}
            {glStats && glStats.n === 0 && (
              <div style={{textAlign:'center',padding:'32px 0',color:'var(--text2)'}}>Sem leituras no período.</div>
            )}
          </>
        )}

        {/* ══════════════════════════════
            ABA PREVISÕES
        ══════════════════════════════ */}
        {tab==='pred' && (
          <>
            {predLoad && <div style={{textAlign:'center',padding:'40px 0',color:'var(--text2)'}}>Carregando…</div>}
            {predErr  && <div style={{textAlign:'center',padding:'20px 0',color:'#ef4444',fontSize:'13px'}}>{predErr}</div>}

            {predData && predData.total > 0 && (
              <>
                <div style={{textAlign:'center',marginBottom:20}}>
                  <span style={{fontSize:'28px',fontWeight:800,color:'var(--accent)'}}>{predData.total}</span>
                  <span style={{fontSize:'13px',color:'var(--text2)',marginLeft:6}}>previsões validadas</span>
                </div>

                <div style={{background:'var(--surface2)',borderRadius:12,padding:'14px 16px',marginBottom:16}}>
                  <div style={{display:'grid',gridTemplateColumns:'72px 1fr 60px 52px',gap:'6px 10px',alignItems:'center'}}>
                    <span style={{fontSize:'11px',fontWeight:700,color:'var(--text3)',textTransform:'uppercase'}}>Horizonte</span>
                    <span style={{fontSize:'11px',fontWeight:700,color:'var(--text3)',textTransform:'uppercase'}}>MAE</span>
                    <span style={{fontSize:'11px',fontWeight:700,color:'var(--text3)',textTransform:'uppercase'}}>Viés</span>
                    <span style={{fontSize:'11px',fontWeight:700,color:'var(--text3)',textTransform:'uppercase'}}>±20</span>
                    {horizons.map(({t,label})=>(
                      <React.Fragment key={t}>
                        <span style={{fontSize:'13px',fontWeight:600,color:'var(--text)'}}>{label}</span>
                        <MaeBar v={predData[t]?.mae}/>
                        <BiasTag v={predData[t]?.bias}/>
                        <P20Tag v={predData[t]?.p20}/>
                      </React.Fragment>
                    ))}
                  </div>
                </div>

                <div style={{fontSize:'12px',fontWeight:700,color:'var(--text2)',marginBottom:8,textTransform:'uppercase',letterSpacing:'.5px'}}>Por zona glicêmica</div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {(predData.zones||[]).sort((a,b)=>a.zona<b.zona?-1:1).map(z=>(
                    <div key={z.zona} style={{background:'var(--surface2)',borderRadius:10,padding:'10px 14px'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                        <span style={{fontSize:'13px',fontWeight:700,color:zoneLabel[z.zona]?.col||'var(--text)'}}>
                          {zoneLabel[z.zona]?.label||z.zona}
                        </span>
                        <span style={{fontSize:'11px',color:'var(--text3)',background:'var(--surface)',padding:'2px 8px',borderRadius:20}}>{z.n} amostras</span>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
                        {[{t:'t30',l:'+30'},{t:'t60',l:'+60'},{t:'t90',l:'+90'}].map(({t,l})=>(
                          <div key={t} style={{textAlign:'center'}}>
                            <div style={{fontSize:'11px',color:'var(--text3)',marginBottom:2}}>{l}</div>
                            <BiasTag v={z[t]?.bias}/>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                <div style={{marginTop:16,fontSize:'11px',color:'var(--text3)',lineHeight:1.6}}>
                  <strong>MAE</strong> = erro médio absoluto (mg/dL) · <strong>Viés</strong> = actual − previsto · <strong>±20</strong> = % dentro de ±20 mg/dL
                </div>
              </>
            )}
            {predData && predData.total === 0 && (
              <div style={{textAlign:'center',padding:'32px 0',color:'var(--text2)'}}>Nenhuma previsão validada ainda.</div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

/* ── SETTINGS MODAL ───────────────────────────────────────────────────── */
function SettingsModal({open, onClose}) {
  const {dark} = useContext(ThemeCtx);
  const {settings, setSettings} = useContext(SettingsCtx);

  // Draft como strings para evitar congelamento de inputs controlados
  const toStr = (s) => ({
    ...s,
    isf:         String(s.isf),
    corrTarget:  String(s.corrTarget),
    corrPostMeal:String(s.corrPostMeal),
    icrRanges:   s.icrRanges.map(r=>({...r, icr:String(r.icr)})),
  });
  const [draft, setDraft] = useState(()=>toStr(settings));
  const [adding, setAdding] = useState(false);
  const [newRange, setNewRange] = useState({start:"06:00",end:"18:00",icr:"5"});
  const [addErr, setAddErr] = useState("");

  // ── Análise ICR baseada em dados reais
  const [icrAnalysis, setIcrAnalysis] = useState(null);
  const [icrAnalysisLoad, setIcrAnalysisLoad] = useState(false);

  const runIcrAnalysis = async () => {
    setIcrAnalysisLoad(true);
    try {
      const isf  = parseFloat(draft.isf) || 30;
      const tgt  = parseFloat(draft.corrTarget) || 110;
      // Busca últimos 30 dias de refeições com dose
      const since = new Date(Date.now() - 30*24*3600000).toISOString();
      const [mealsRes, glucRes] = await Promise.all([
        fetch(`${SUPABASE_URL}/rest/v1/meal_records?select=id,recorded_at,carbs,applied_dose,glucose_before,meal_type&applied_dose=gt.0&carbs=gt.0&recorded_at=gte.${since}&limit=300`,
          { headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` } }),
        fetch(`${SUPABASE_URL}/rest/v1/glucose_readings?select=value,captured_at&captured_at=gte.${since}&order=captured_at.asc&limit=8000`,
          { headers:{ apikey:SUPABASE_KEY, Authorization:`Bearer ${SUPABASE_KEY}` } }),
      ]);
      const meals = await mealsRes.json();
      const gluc  = await glucRes.json();

      // Para cada refeição, encontra leitura 90-150min após
      const enriched = meals
        .filter(m => m.glucose_before >= 70 && m.glucose_before <= 200)
        .map(m => {
          const mTs = new Date(m.recorded_at).getTime();
          const win = gluc.filter(g => {
            const gTs = new Date(g.captured_at).getTime();
            return gTs >= mTs + 90*60000 && gTs <= mTs + 150*60000;
          });
          if(!win.length) return null;
          const g2h = win.reduce((best, g) =>
            Math.abs(new Date(g.captured_at).getTime() - (mTs+120*60000)) <
            Math.abs(new Date(best.captured_at).getTime() - (mTs+120*60000)) ? g : best
          ).value;
          const corr = Math.max(0, (m.glucose_before - tgt) / isf);
          const dosePrandial = Math.max(0, m.applied_dose - corr);
          if(dosePrandial < 1.0) return null; // dose quase só correção
          const icrEf = m.carbs / dosePrandial;
          const hora  = new Date(new Date(m.recorded_at).getTime() + (-3)*3600000).getUTCHours();
          return { hora, carbs:m.carbs, dose:m.applied_dose, dosePrandial, icrEf, g2h, gBefore:m.glucose_before };
        })
        .filter(Boolean);

      // Agrupa pelas faixas de ICR configuradas no draft
      const ranges = draft.icrRanges.map(r => {
        const [sh,sm] = r.start.split(':').map(Number);
        const [eh,em] = r.end.split(':').map(Number);
        const startMin = sh*60+sm, endMin = eh*60+em;
        const inRange = h => {
          const hm = h*60;
          return startMin <= endMin ? hm>=startMin && hm<endMin : hm>=startMin || hm<endMin;
        };
        const items = enriched.filter(e => inRange(e.hora));
        if(!items.length) return { ...r, n:0 };
        const nAlto  = items.filter(e=>e.g2h>180).length;
        const nBom   = items.filter(e=>e.g2h>=100&&e.g2h<=160).length;
        const nBaixo = items.filter(e=>e.g2h<100).length;
        const icrMed = items.reduce((s,e)=>s+e.icrEf,0)/items.length;
        const g2hMed = Math.round(items.reduce((s,e)=>s+e.g2h,0)/items.length);
        // Sugestão: se >55% alto → reduzir ICR 10%; se >55% baixo → aumentar 10%
        let sugestao = null;
        const pAlto  = nAlto/items.length;
        const pBaixo = nBaixo/items.length;
        const icrAtual = parseInt(r.icr);
        if(pAlto > 0.55)       sugestao = Math.max(1, +(icrMed*0.9).toFixed(1));
        else if(pBaixo > 0.55) sugestao = +(icrMed*1.1).toFixed(1);
        return { ...r, n:items.length, nAlto, nBom, nBaixo, icrMed:+icrMed.toFixed(1), g2hMed, sugestao };
      });
      setIcrAnalysis(ranges);
    } catch(e) { setIcrAnalysis([]); }
    finally { setIcrAnalysisLoad(false); }
  };

  useEffect(()=>{
    if(open){ setDraft(toStr(settings)); setAdding(false); setAddErr(""); setNewRange({start:"06:00",end:"18:00",icr:"5"}); }
  },[open]);

  const updRange = (id, key, val) =>
    setDraft(d=>({...d, icrRanges:d.icrRanges.map(r=>r.id===id?{...r,[key]:val}:r)}));

  const delRange = (id) => {
    if(draft.icrRanges.length<=1) return;
    setDraft(d=>({...d, icrRanges:d.icrRanges.filter(r=>r.id!==id)}));
  };

  const confirmAdd = () => {
    const icr = parseInt(newRange.icr);
    if(newRange.start===newRange.end) return setAddErr("Início e fim iguais");
    if(isNaN(icr)||icr<1||icr>30) return setAddErr("ICR: valor entre 1 e 30");
    setDraft(d=>({...d, icrRanges:[...d.icrRanges,{...newRange,icr:String(icr),id:Date.now().toString()}]}));
    setAdding(false); setAddErr(""); setNewRange({start:"06:00",end:"18:00",icr:"5"});
  };

  const save = () => {
    if(!draft.icrRanges.length) return;
    const saved = {
      ...draft,
      isf:          parseFloat(draft.isf)||30,
      corrTarget:   parseFloat(draft.corrTarget)||110,
      corrPostMeal: parseFloat(draft.corrPostMeal)||160,
      icrRanges:    draft.icrRanges.map(r=>({...r, icr:parseInt(r.icr)||5})),
    };
    appSettings = saved;
    setSettings(saved);
    lsSet(KEY_SETTINGS, saved);
    sbSaveSettings(saved); // Supabase — fonte de verdade para recuperação
    onClose();
  };

  // Select de horário: opções a cada 30min (00:00–23:30)
  const timeOpts = [];
  for(let h=0;h<24;h++) for(let m of [0,30])
    timeOpts.push(`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`);

  const timeSelect = (val, onChange) => (
    <select value={val} onChange={e=>onChange(e.target.value)}
      style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"8px",
        padding:"8px 6px",color:"var(--text)",fontSize:"14px",fontFamily:"var(--mono)",
        flex:1,touchAction:"manipulation",cursor:"pointer"}}>
      {timeOpts.map(t=><option key={t} value={t}>{t}</option>)}
    </select>
  );

  const icrInput = (val, onChange) => (
    <input type="number" inputMode="numeric" pattern="[0-9]*" value={val}
      onChange={e=>onChange(e.target.value.replace(/[^0-9]/g,""))}
      style={{width:"48px",background:"var(--surface2)",border:"1px solid var(--border)",
        borderRadius:"8px",padding:"8px 4px",color:"var(--text)",fontSize:"16px",
        fontFamily:"var(--mono)",textAlign:"center",touchAction:"manipulation"}}/>
  );

  const numInput = (draftKey, min, max) => (
    <input type="number" inputMode="decimal" value={draft[draftKey]}
      onChange={e=>setDraft(d=>({...d,[draftKey]:e.target.value.replace(/[^0-9.]/g,"")}))}
      style={{width:"72px",background:"var(--surface2)",border:"1px solid var(--border)",
        borderRadius:"8px",padding:"7px 10px",color:"var(--text)",fontSize:"16px",
        fontFamily:"var(--mono)",textAlign:"center",touchAction:"manipulation"}}/>
  );

  const numField = (label, key, unit) => (
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
      padding:"11px 0",borderBottom:"1px solid var(--border)"}}>
      <div style={{flex:1,paddingRight:"10px"}}>
        <div style={{fontSize:"13px",fontWeight:600,color:"var(--text)"}}>{label}</div>
        <div style={{fontSize:"10px",color:"var(--text3)",marginTop:"1px"}}>{unit}</div>
      </div>
      {numInput(key)}
    </div>
  );

  if (!open) return null;
  return (
    <>
      <div style={{position:"fixed",inset:0,zIndex:299,background:"rgba(0,0,0,.5)",backdropFilter:"blur(3px)"}}
        onClick={onClose}/>
      <div onClick={e=>e.stopPropagation()}
        style={{position:"fixed",bottom:0,left:0,right:0,zIndex:300,
          borderRadius:"20px 20px 0 0",padding:0,maxHeight:"90vh",display:"flex",flexDirection:"column",
          background:"var(--surface)",boxShadow:"0 -4px 24px rgba(0,0,0,.3)",animation:"alertIn .2s ease",
          border:"1px solid var(--border)"}}>

        {/* Header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
          padding:"16px 16px 12px",borderBottom:"1px solid var(--border)",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:"8px",fontSize:"15px",fontWeight:700,color:"var(--text)"}}>
            <IcoGear s={16} c="var(--accent)"/> Configurações
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",
            padding:"8px",display:"flex",alignItems:"center",touchAction:"manipulation"}}>
            <IcoX s={18} c="var(--text3)"/>
          </button>
        </div>

        {/* Scroll body */}
        <div style={{overflow:"auto",flex:1,padding:"0 16px 8px",WebkitOverflowScrolling:"touch"}}>

          {/* ICR Ranges */}
          <div style={{fontSize:"11px",fontWeight:700,color:"var(--text3)",textTransform:"uppercase",
            letterSpacing:".06em",padding:"14px 0 8px"}}>ICR — Relação insulina/carboidrato</div>

          {draft.icrRanges.length===0 && (
            <div style={{fontSize:"12px",color:"var(--text3)",padding:"8px 0",fontStyle:"italic"}}>
              Nenhuma faixa. Adicione ao menos uma.
            </div>
          )}

          {draft.icrRanges.map((r)=>(
            <div key={r.id} style={{background:"var(--surface2)",borderRadius:"10px",
              padding:"12px",marginBottom:"8px",border:"1px solid var(--border)"}}>
              {/* Horário */}
              <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"10px"}}>
                <span style={{fontSize:"11px",color:"var(--text3)",flexShrink:0,width:"22px"}}>De</span>
                {timeSelect(r.start, v=>updRange(r.id,"start",v))}
                <span style={{fontSize:"11px",color:"var(--text3)",flexShrink:0}}>até</span>
                {timeSelect(r.end, v=>updRange(r.id,"end",v))}
              </div>
              {/* ICR + delete */}
              <div style={{display:"flex",alignItems:"center",gap:"8px"}}>
                <span style={{fontSize:"12px",color:"var(--text2)",flex:1}}>1U para cada</span>
                {icrInput(r.icr, v=>updRange(r.id,"icr",v))}
                <span style={{fontSize:"12px",color:"var(--text2)"}}>g CHO</span>
                <button
                  onClick={()=>delRange(r.id)}
                  style={{background:draft.icrRanges.length<=1?"none":"rgba(239,68,68,.1)",
                    border:`1px solid ${draft.icrRanges.length<=1?"transparent":"rgba(239,68,68,.35)"}`,
                    borderRadius:"8px",padding:"7px 10px",cursor:draft.icrRanges.length<=1?"default":"pointer",
                    display:"flex",alignItems:"center",opacity:draft.icrRanges.length<=1?.25:1,
                    touchAction:"manipulation",flexShrink:0}}>
                  <IcoTrash s={14} c="#ef4444"/>
                </button>
              </div>
            </div>
          ))}

          {/* Adicionar faixa */}
          {adding ? (
            <div style={{background:dark?"rgba(13,148,136,.08)":"rgba(13,148,136,.05)",borderRadius:"10px",
              padding:"12px",border:"1px dashed rgba(13,148,136,.4)",marginBottom:"8px"}}>
              <div style={{fontSize:"12px",fontWeight:700,color:"var(--accent)",marginBottom:"10px"}}>
                Nova faixa
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"10px"}}>
                <span style={{fontSize:"11px",color:"var(--text3)",flexShrink:0,width:"22px"}}>De</span>
                {timeSelect(newRange.start, v=>setNewRange(r=>({...r,start:v})))}
                <span style={{fontSize:"11px",color:"var(--text3)",flexShrink:0}}>até</span>
                {timeSelect(newRange.end, v=>setNewRange(r=>({...r,end:v})))}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"10px"}}>
                <span style={{fontSize:"12px",color:"var(--text2)",flex:1}}>1U para cada</span>
                {icrInput(newRange.icr, v=>setNewRange(r=>({...r,icr:v})))}
                <span style={{fontSize:"12px",color:"var(--text2)"}}>g CHO</span>
              </div>
              {addErr && <div style={{fontSize:"11px",color:"#ef4444",marginBottom:"8px",fontWeight:600}}>{addErr}</div>}
              <div style={{display:"flex",gap:"8px"}}>
                <button onClick={()=>{setAdding(false);setAddErr("");}} className="btn btn-ghost"
                  style={{flex:1,padding:"10px",fontSize:"13px",touchAction:"manipulation"}}>
                  Cancelar
                </button>
                <button onClick={confirmAdd} className="btn btn-primary"
                  style={{flex:2,padding:"10px",fontSize:"13px",touchAction:"manipulation",
                    display:"flex",alignItems:"center",justifyContent:"center",gap:"4px"}}>
                  <IcoCheck s={13} c="white"/> Adicionar
                </button>
              </div>
            </div>
          ) : (
            <button onClick={()=>setAdding(true)} touchAction="manipulation"
              style={{width:"100%",padding:"11px",borderRadius:"9px",
                border:"1px dashed var(--border)",background:"transparent",

/* ── FAB / DOSE AVULSA ────────────────────────────────────────────────── */
function FAB({onRegisterDose, totalIOB, pred60, open, onClose}) {
  const {dark} = useContext(ThemeCtx);
  const [dose,setDose]=useState(""),[note,setNote]=useState("");
  const sub=()=>{const u=Math.round(parseFloat(dose));if(!u||u<=0||u>50)return;onRegisterDose(u,note||"Dose avulsa");setDose("");setNote("");onClose();};
  const stackingRisk = totalIOB && totalIOB > 2;
  if (!open) return null;
  return (
    <>
      <div style={{position:"fixed",inset:0,zIndex:199,background:"rgba(0,0,0,.35)",backdropFilter:"blur(2px)"}} onClick={onClose}/>
      <div className="card" style={{position:"fixed",bottom:"calc(var(--bar-h) + 12px)",right:"16px",
        padding:"16px",width:"240px",zIndex:200,boxShadow:"var(--shadow-md)",animation:"fadeIn .18s ease"}}>
        {stackingRisk && (
          <div style={{background:dark?"rgba(239,68,68,.12)":"rgba(254,226,226,.8)",border:"1px solid rgba(239,68,68,.35)",
            borderRadius:"8px",padding:"8px 10px",marginBottom:"12px",fontSize:"11px",color:"#ef4444",lineHeight:1.4}}>
            ⚠️ <strong>IOB alto: {totalIOB}U</strong>{pred60?` · +60min: ${pred60} mg/dL`:""}<br/>
            <span style={{opacity:.8}}>Confirme se nova dose é necessária.</span>
          </div>
        )}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
          <div style={{fontSize:"13px",fontWeight:700,color:"var(--accent)",display:"flex",alignItems:"center",gap:"6px"}}>
            <IcoSyringe s={15} c="var(--accent)"/> Dose avulsa
          </div>
          <button onClick={onClose} aria-label="Fechar" style={{background:"none",border:"none",cursor:"pointer",
            color:"var(--text3)",padding:"4px",display:"flex",alignItems:"center",borderRadius:"6px"}}>
            <IcoX s={16} c="var(--text3)"/>
          </button>
        </div>
        <input value={dose} onChange={e=>setDose(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sub()}

          style={{width:"100%",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"10px",
            padding:"10px 12px",color:"var(--text)",fontSize:"22px",fontFamily:"var(--mono)",marginBottom:"8px",textAlign:"center"}}/>
        <input value={note} onChange={e=>setNote(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sub()} placeholder="Nota (opcional)"
          style={{width:"100%",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"10px",
            padding:"10px 12px",color:"var(--text)",fontSize:"13px",marginBottom:"12px"}}/>
        <button className="btn btn-primary" onClick={sub} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px",padding:"11px"}}>
          <IcoCheck s={15} c="white"/> Registrar dose
        </button>
      </div>
    </>
  );
}

/* ── APP ─────────────────────────────────────────────────────────────────── */
function App() {
  const [dark,setDark]       = useState(()=>lsGet(KEY_THEME)||false);
  const [tab,setTab]         = useState("chart");
  const [mealOpen,setMealOpen] = useState(false);
  const [fabOpen,setFabOpen] = useState(false);
  const [settingsOpen,setSettingsOpen] = useState(false);
  const [dashOpen,    setDashOpen]     = useState(false);
  const [settings,setSettingsState] = useState(()=>{
    const s = migrateSettings(lsGet(KEY_SETTINGS)) || {...DEFAULT_SETTINGS};
    appSettings = s;
    return s;
  });
  const setSettings = (s) => { appSettings = s; setSettingsState(s); };
  const [msgs,setMsgs]       = useState([{role:"assistant",content:"Olá! 👋 Conectando ao sensor Libre...\n\nMe diga o que vai comer ou registre seu treino.",time:fmtTime()}]);
  const [input,setInput]     = useState("");
  const [images,setImages]   = useState([]);
  const [loading,setLoad]    = useState(false);
  const [timers,setTimers]   = useState([]);
  const [history,setHist]    = useState(()=>lsGet(KEY_HISTORY)||[]);
  const [library,setLib]     = useState([]); // T5: carregado do Supabase no mount
  const [doses,setDoses]     = useState(()=>loadDoses());
  const [pending,setPending] = useState(null);
  const [glucose,setGlucose] = useState(null);
  const [gLoad,setGLoad]     = useState(false);
  const [tirStats,setTirStats] = useState(null);
  // Alertas dismissíveis — reset automático em cada nova leitura do sensor
  const [dismissed, setDismissed] = useState(new Set());
  const prevGForDismissRef = useRef(null);
  useEffect(()=>{
    if(glucose?.glucose && glucose.glucose !== prevGForDismissRef.current){
      setDismissed(new Set());
      prevGForDismissRef.current = glucose.glucose;
    }
  },[glucose?.glucose]);
  const dismissAlert = key => setDismissed(prev => new Set([...prev, key]));
  const [predictions,setPreds] = useState([]);
  const [isOnline,setIsOnline] = useState(()=>navigator.onLine); // T2: modo offline
  const predStoreRef   = useRef(lsGet(KEY_PREDSTORE) || []); // Camada 2: persiste entre sessões
  const prevGlucoseRef = useRef(null); // S4: detecção de variabilidade rápida
  const queuedMsgRef   = useRef(null); // T4: fila Groq
  const [apiKey,setApiKey]   = useState(()=>lsGet(KEY_APIKEY)||"");
  const fileRef = useRef(null), taRef = useRef(null);
  const chartRowsRef = useRef([]);

  // Recompute predictions whenever glucose or doses change
  useEffect(()=>{
    if(!glucose?.glucose||glucose?.error) return;
    const preds = predictGlucose(glucose.glucose, glucose.trendEmoji, doses, dark);
    setPreds(preds);
    // M1: armazena previsão com IOB e COB atuais para validação futura no Supabase
    const nowMs = Date.now();
    const live  = filterDoses(doses);
    const entry = {
      id:          nowMs.toString(),
      predictedAt: nowMs,
      base:        glucose.glucose,
      preds:       preds.map(p=>({t:p.t,v:p.value})),
      iob:         calcTotalIOB(live),
      cob:         calcTotalActiveCarbs(live),
    };
    predStoreRef.current = [...predStoreRef.current.slice(-50), entry];
    lsSet(KEY_PREDSTORE, predStoreRef.current); // Camada 2: persiste entre sessões
  },[glucose?.glucose, glucose?.trendEmoji, doses]);

  useEffect(()=>{
    document.documentElement.setAttribute("data-theme", dark?"dark":"light");
    lsSet(KEY_THEME, dark);
  },[dark]);

  useEffect(()=>{ lsSet(KEY_HISTORY,history); },[history]);
  // T5: library não vai mais para localStorage — fonte de verdade é Supabase
  useEffect(()=>{ lsSet(KEY_DOSES,doses); },[doses]);

  // T2: detecção online/offline
  useEffect(()=>{
    const on  = ()=>setIsOnline(true);
    const off = ()=>setIsOnline(false);
    window.addEventListener("online",  on);
    window.addEventListener("offline", off);
    return()=>{ window.removeEventListener("online",on); window.removeEventListener("offline",off); };
  },[]);

  // T5: carrega biblioteca de alimentos do Supabase no mount
  useEffect(()=>{
    sbFetchLibrary().then(rows=>{
      if(rows && rows.length > 0){
        setLib(rows);
      } else if(rows !== null) {
        // Supabase acessível mas vazio — migra localStorage se houver
        const legacy = lsGet("bolus-library-v1");
        if(legacy?.length){
          const migrated = legacy.map(it=>({...it, id: it.id||Date.now().toString()+Math.random().toString(36).slice(2)}));
          setLib(migrated);
          migrated.forEach(sbUpsertLibraryItem);
        }
      }
      // rows === null = Supabase offline → manter [] (tabela pode não existir ainda)
    });
  },[]);

  useEffect(()=>{
    const id=setInterval(()=>setDoses(p=>{const f=filterDoses(p);return f.length!==p.length?f:p;}),60000);
    return()=>clearInterval(id);
  },[]);

  /* ── Fetch glucose ── */
  const fetchGlucose = useCallback(async(retry=false)=>{
    if(!retry) setGLoad(true);
    try{
      const res=await fetch(PROXY_URL,{signal:AbortSignal.timeout(25000)});
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const d=await res.json();
      // Validate stored predictions against this new reading
      if(d?.glucose && !d?.error) {
        const nowMs = Date.now();

        // S4: detecção de variabilidade rápida a partir de leituras consecutivas
        // Limiar 2.5 mg/dL/min captura ⬆️/⬇️ do Abbott (mais confiável que delta bruto)
        const prev = prevGlucoseRef.current;
        if(prev && prev.value !== d.glucose){
          // Nova leitura do sensor (valor mudou)
          const dtMin = (nowMs - prev.ts) / 60000;
          if(dtMin > 0 && dtMin < 30){ // janela máxima 30min entre leituras
            const rate = (d.glucose - prev.value) / dtMin; // mg/dL/min
            d._velocity = +rate.toFixed(2); // injeta no objeto para uso no widget
          }
        }
        prevGlucoseRef.current = { value: d.glucose, ts: nowMs };

        // M1: valida previsões passadas com a leitura atual, grava no Supabase
        const updatedStore = (predStoreRef.current||[]).map(entry => {
          if(entry.validated) return entry;
          const updated = {...entry};
          let anyValidated = false;
          (entry.preds||[]).forEach(p => {
            const targetMs = entry.predictedAt + p.t*60000;
            const key = `actual${p.t}`;
            if(!updated[key] && Math.abs(nowMs - targetMs) < 8*60000) {
              updated[key]       = d.glucose;
              updated[`err${p.t}`] = Math.round(d.glucose - p.v);
              anyValidated = true;
            }
          });
          // Se todos os horizontes foram validados, persiste no Supabase e marca
          const allDone = [30,60,90].every(t => updated[`actual${t}`] != null);
          if(allDone && !entry.validated) {
            updated.validated = true;
            sbUpsertPrediction(updated); // fire-and-forget
          } else if(anyValidated) {
            sbUpsertPrediction(updated); // grava parcial também
          }
          return updated;
        });
        predStoreRef.current = updatedStore;
        lsSet(KEY_PREDSTORE, updatedStore); // Camada 2: persiste validações entre sessões
      }
      setGlucose(d); return d;
    }catch(e){
      if(!retry&&(e.name==="TimeoutError"||e.message?.includes("timed out")||e.message?.includes("signal"))){setTimeout(()=>fetchGlucose(true),4000);return null;}
      setGlucose({error:e.message?.includes("Failed to fetch")||e.message?.includes("ECONNREFUSED")?"Proxy offline":e.message});
      return null;
    }finally{if(!retry)setGLoad(false);}
  },[]);

  useEffect(()=>{fetchGlucose();const id=setInterval(fetchGlucose,60000);return()=>clearInterval(id);},[fetchGlucose]);

  /* ── Fetch TIR widget ── */
  const fetchTIR = useCallback(async()=>{
    try{
      const since=new Date(Date.now()-8*3600000).toISOString();
      const res=await fetch(
        `${SUPABASE_URL}/rest/v1/glucose_readings?select=value&captured_at=gte.${since}&limit=500`,
        {headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}}
      );
      if(!res.ok) return;
      const rows=await res.json();
      if(!rows.length) return;
      const vals=rows.map(r=>r.value), n=vals.length;
      setTirStats({
        tir:Math.round(vals.filter(v=>v>=70&&v<=180).length/n*100),
        tbr:Math.round(vals.filter(v=>v<70).length/n*100),
        tar:Math.round(vals.filter(v=>v>180).length/n*100)
      });
    }catch{}
  },[]);

  useEffect(()=>{fetchTIR();const id=setInterval(fetchTIR,300000);return()=>clearInterval(id);},[fetchTIR]);

  // Camada 2: fecha loops de previsões pendentes a cada 5min via Supabase (mesmo sem app aberto)
  useEffect(()=>{
    sbClosePendingPredictions();
    const id=setInterval(sbClosePendingPredictions,300000);
    return()=>clearInterval(id);
  },[]);

  /* ── Carregar refeições e settings do Supabase no mount ── */
  useEffect(()=>{
    // Settings: Supabase > localStorage (recuperação após clear do browser)
    sbLoadSettings().then(sbSettings => {
      if(sbSettings) {
        const migrated = migrateSettings(sbSettings) || sbSettings;
        appSettings = migrated;
        setSettings(migrated);
        lsSet(KEY_SETTINGS, migrated);
      }
    });
    sbFetchMeals().then(rows=>{
      if(!rows) return; // falha silenciosa — mantém localStorage
      if(rows.length > 0){
        setHist(rows);
        lsSet(KEY_HISTORY, rows); // sincroniza cache local
        // Rebuild doses[] a partir dos registros ativos do Supabase
        // Garante que badge, COB e previsão sejam iguais em qualquer device
        const activeDosesFromSb = rows
          .filter(r => r.appliedAt && calcRemMin(r.appliedAt) > 0)
          .map(r => ({
            units:     r.appliedDose != null ? r.appliedDose : 0,
            appliedAt: r.appliedAt,
            carbs:     r.carbs || null,
            carbType:  r.carbType || 'fast', // M2+T3: restaura tipo de absorção do Supabase
          }));
        if(activeDosesFromSb.length > 0){
          setDoses(activeDosesFromSb);
          lsSet(KEY_DOSES, activeDosesFromSb);
        }
      }
    });
  },[]);

  /* ── IOB context ── */
  const iobContext = useCallback(()=>{
    const live=filterDoses(doses); if(!live.length) return "";
    const total=calcTotalIOB(live);
    const detail=live.map(d=>`${d.units}U às ${fmtTime(new Date(d.appliedAt))} (${calcIOB(d.units,d.appliedAt).toFixed(1)}U restante)`).join(", ");
    return `IOB ATUAL: ${total}U total — doses ativas: ${detail}`;
  },[doses]);

  /* ── Build Groq messages ── */
  const buildGroqMsgs = useCallback((newText,newImgs)=>{
    const messages=[];
    messages.push({role:"system",content:buildSystemPrompt(settings)});
    for(const m of msgs){
      if(m.role==="assistant"){
        messages.push({role:"assistant",content:m.content||" "});
      } else {
        if(m.images?.length){
          const parts=m.images.map(s=>{const i=s.indexOf(",");const d=i>=0?s.slice(i+1):"";return{type:"image_url",image_url:{url:`data:image/jpeg;base64,${d}`}};});
          parts.push({type:"text",text:m.content||"Analise a imagem."});
          messages.push({role:"user",content:parts});
        } else {
          messages.push({role:"user",content:m.content||"..."});
        }
      }
    }
    let txt=newText||"Analise as imagens.";
    const ctx=[];
    // Hora local — crítico para seleção correta do ICR
    const _now=new Date();
    const _dias=["domingo","segunda","terça","quarta","quinta","sexta","sábado"];
    const _hhmm=_now.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
    const _dayName=_dias[_now.getDay()];
    const _isFDS=[0,6].includes(_now.getDay());
    ctx.push(`HORA LOCAL: ${_hhmm} (${_dayName}${_isFDS?" — fim de semana":""})`);
    if(glucose?.glucose&&!glucose.error)
      ctx.push(`GLICEMIA ATUAL DO SENSOR: ${glucose.glucose} mg/dL ${glucose.trendEmoji||"→"} (${glucose.trendText||"estável"}), leitura em tempo real`);
    const iob=iobContext(); if(iob) ctx.push(iob);
    // Pós-prandial: alvo diferente nas primeiras 2h
    const live=filterDoses(doses);
    const lastDoseMs=live.length?Math.max(...live.map(d=>d.appliedAt)):null;
    const minsPostDose=lastDoseMs?Math.round((Date.now()-lastDoseMs)/60000):null;
    if(minsPostDose!==null&&minsPostDose<120)
      ctx.push(`PERÍODO PÓS-PRANDIAL: ${minsPostDose}min desde última dose — use alvo ${settings.corrPostMeal} mg/dL para correção. Correção nunca negativa: se resultado for negativo, use 0.`);
    const activeEx = calcExerciseReduction(history);
    if(activeEx) {
      ctx.push(`ALERTA CLÍNICO: O usuário realizou ${activeEx.type} há ${activeEx.hoursAgo}h. Reduza a dose total final desta refeição em EXATAMENTE ${activeEx.reduction}% (modelo de decaimento de glicogênio).`);
    }
    if(ctx.length) txt=`[${ctx.join(" | ")}]\n\n${txt}`;
    if(newImgs?.length){
      const parts=newImgs.map(s=>{const i=s.indexOf(",");const d=i>=0?s.slice(i+1):"";return{type:"image_url",image_url:{url:`data:image/jpeg;base64,${d}`}};});
      parts.push({type:"text",text:txt});
      messages.push({role:"user",content:parts});
    } else {
      messages.push({role:"user",content:txt});
    }
    return messages;
  },[msgs,glucose,iobContext,settings]);

  /* ── Register dose — armazena carbos para carbos ativos ── */
  const registerDose = useCallback((units, suggested, meal, note, carbType='fast', overrideAt=null)=>{
    const at = overrideAt || Date.now(); // A3: refeição retroativa usa timestamp passado
    if(!units){
      if(pending){
        const pendingRecord = history.find(r=>r.id===pending);
        const carbs = pendingRecord?.carbs || null;
        const ct = pendingRecord?.carbType || carbType || 'fast';
        // Registrar carbos mesmo sem dose: mantém COB ativo (comer sem insulina ainda conta)
        if(carbs) setDoses(prev=>[...filterDoses(prev),{units:0,appliedAt:at,carbs,carbType:ct}]);
        // appliedAt no history: necessário para marcador aparecer no gráfico
        const skippedRec = pendingRecord ? {...pendingRecord,appliedDose:0,appliedAt:at} : null;
        setHist(p=>p.map(r=>r.id===pending?{...r,appliedDose:0,appliedAt:at}:r));
        if(skippedRec) sbUpsertMeal({...skippedRec,appliedDose:0,appliedAt:at});
        setPending(null);
      }
      return;
    }
    // Busca carbos e carbType do registro pendente para armazenar na dose
    const pendingRecord = pending ? history.find(r=>r.id===pending) : null;
    const carbs = pendingRecord?.carbs || null;
    const ct = carbType || pendingRecord?.carbType || 'fast';

    setDoses(prev=>[...filterDoses(prev),{units,appliedAt:at,carbs,carbType:ct}]);
    if(pending){
      const updatedRec = pendingRecord ? {...pendingRecord,appliedDose:units,appliedAt:at,carbType:ct} : null;
      setHist(p=>p.map(r=>r.id===pending?{...r,appliedDose:units,appliedAt:at,carbType:ct}:r));
      if(updatedRec) sbUpsertMeal(updatedRec);
      setPending(null);
    } else {
      const newRec = {id:Date.now().toString(),datetime:fmtDateTime(),meal:note||"Dose avulsa",appliedDose:units,suggestedDose:suggested||null,appliedAt:at,note,carbType:ct};
      setHist(p=>[...p,newRec]);
      sbUpsertMeal(newRec);
    }
    setMsgs(p=>[...p,{role:"assistant",content:`✅ **${units}U registrada** às ${fmtTime()}\nPrevisão fim: **${fmtTime(calcEndTime(at))}** (~4h)\n\n💬 IOB atualizado. Considerarei nas próximas correções.`,time:fmtTime()}]);
    setTimers(p=>[...p,{id:Date.now().toString(),startedAt:at,dismissed:false}]);
  },[pending, history]);

  /* ── Update history record (edit meal/dose) — sincroniza doses[] pelo appliedAt ── */
  const updateHistRecord = useCallback((id, updates)=>{
    // Atualiza history[] e doses[] em dois setters independentes (não aninhar setters em updaters)
    setHist(p=>p.map(r=> r.id!==id ? r : {...r,...updates}));
    // Sincroniza doses[] pelo appliedAt do registro
    const record = history.find(r=>r.id===id);
    if(record){
      const merged = {...record,...updates};
      sbUpsertMeal(merged); // persiste no Supabase
      if(record.appliedAt && (updates.carbs != null || updates.appliedDose != null)){
        setDoses(prev=>prev.map(d=>{
          if(d.appliedAt !== record.appliedAt) return d;
          return {
            ...d,
            ...(updates.carbs       != null ? {carbs: updates.carbs}        : {}),
            ...(updates.appliedDose != null ? {units: updates.appliedDose}  : {}),
          };
        }));
      }
    }
  },[history]);

  /* ── Delete history record — remove do state, doses[] e Supabase ── */
  const deleteHistRecord = useCallback((id)=>{
    const rec = history.find(r=>r.id===id);
    setHist(p=>p.filter(r=>r.id!==id));
    // Remove da doses[] pelo appliedAt para limpar IOB/COB
    if(rec?.appliedAt) setDoses(prev=>prev.filter(d=>d.appliedAt!==rec.appliedAt));
    // Se era o registro pendente, limpa pending
    setPending(p=>p===id?null:p);
    sbDeleteMeal(id);
  },[history]);

  /* ── Update carbs no registro pendente — sincroniza doses[] também ── */
  const updatePendingCarbs = useCallback((newCarbs)=>{
    if(!pending) return;
    setHist(p=>p.map(r=>r.id===pending?{...r,carbs:newCarbs}:r));
    setMsgs(p=>{
      // Encontra o índice do último assistente com suggestedDose (mensagem de dose, não outra qualquer)
      let lastDoseIdx = -1;
      for(let i = p.length - 1; i >= 0; i--){
        if(p[i].role === "assistant" && p[i].suggestedDose != null){ lastDoseIdx = i; break; }
      }
      if(lastDoseIdx === -1) return p;
      return p.map((m, i) => i === lastDoseIdx ? {...m, pendingCarbs: newCarbs} : m);
    });
    // Sincroniza doses[] — busca o appliedAt do registro pendente
    const record = history.find(r=>r.id===pending);
    if(record?.appliedAt){
      setDoses(prev=>prev.map(d=>d.appliedAt===record.appliedAt?{...d,carbs:newCarbs}:d));
    }
  },[pending, history]);

  /* ── A3: Registra refeição não anunciada com timestamp retroativo ── */
  const logForgottenMeal = useCallback((carbs, minsAgo, carbType) => {
    const at = Date.now() - minsAgo * 60000; // timestamp real da refeição
    const id  = Date.now().toString();
    const rec = {
      id,
      datetime:     fmtDateTime(new Date(at)),
      meal:         `🍽️ Refeição não anunciada (${CHO_TYPES[carbType]?.label || "Rápido"})`,
      carbs,
      carbType,
      suggestedDose: null,
      appliedDose:  0,          // sem dose — só carbos
      appliedAt:    at,
      glucoseBefore: glucose?.glucose || null,
      recordedAt:   at,         // toSbRow usa este para recorded_at correto
    };
    setHist(p => [...p, rec]);
    sbUpsertMeal(rec);
    // Adiciona ao tracker de carbos ativos com o horário retroativo correto
    setDoses(prev => [...filterDoses(prev), {units:0, appliedAt:at, carbs, carbType}]);
    setMsgs(p => [...p, {
      role:"assistant",
      content:`✅ **${carbs}g CHO registrados** (${minsAgo > 0 ? `há ${minsAgo}min` : "agora"}) · ${CHO_TYPES[carbType]?.emoji} ${CHO_TYPES[carbType]?.label}

COB adicionado ao modelo. Previsões atualizadas.`,
      time:fmtTime()
    }]);
  }, [glucose, doses]);

 /* ── SEND ── */
 const send = useCallback(async(override=null)=>{
   const text=(override??input).trim(); if(!text&&images.length===0) return;
   // T4: se já processando, enfileira e aguarda
   if(loading){
     queuedMsgRef.current = text || "(imagem)";
     return;
   }
   const userMsg={role:"user",content:text||"(imagem)",images:[...images],time:fmtTime()};
   setMsgs(p=>[...p,userMsg]);
   if(!override){setInput("");setImages([]);}
   setLoad(true);
   if(!mealOpen) setMealOpen(true);

   const hasImages = userMsg.images.length > 0;
   
   // 1. DEFINIÇÃO DAS LISTAS DE MODELOS (PLANO A, B, C...)
   const TEXT_MODELS = [
     "llama-3.3-70b-versatile", // Principal: Excelente raciocínio (TACO)
     "llama-3.1-8b-instant",    // Plano B: Muito rápido e estável
     "mixtral-8x7b-32768",      // Plano C: Ótima alternativa da Mistral
     "llama3-8b-8192",          // Plano D: Llama 3 padrão (legado, mas super estável)
     "llama3-70b-8192"          // Plano E: Versão pesada do Llama 3 padrão
   ];
   
   const VIS_MODELS = [
     "llama-3.2-90b-vision-preview", // Principal: Modelo atual de visão
     "llama-3.2-11b-vision-preview"  // Plano B: Visão mais leve e rápida
   ];

   const modelsToTry = hasImages ? VIS_MODELS : TEXT_MODELS;
   const messages    = buildGroqMsgs(text, userMsg.images);

   let success = false;
   let reply = "Sem resposta.";
   let lastErrorMsg = "";
   const MAX_CYCLOS = 2; // Vai tentar varrer a lista toda até 2 vezes

   try {
     // 2. LÓGICA DE TENTATIVA, ERRO, RESPIRO E LOOP
     for (let ciclo = 1; ciclo <= MAX_CYCLOS; ciclo++) {
       
       for (const currentModel of modelsToTry) {
         try {
           const res = await fetch(GROQ_URL, {
             method:"POST",
             headers:{"Content-Type":"application/json","Authorization":`Bearer ${apiKey}`},
             body: JSON.stringify({model: currentModel, messages, max_tokens:1500, temperature:0.3})
           });
           
           const data = await res.json();

           // Se a Groq retornar erro (como 429 limite ou 404 descontinuado)
           if (!res.ok) {
             lastErrorMsg = data?.error?.message || `Erro HTTP ${res.status}`;
             console.warn(`[Groq] Ciclo ${ciclo} - Falha no ${currentModel}: ${lastErrorMsg}`);
             
             // RESPIRO: Se for erro 429 (Rate Limit), espera 2s. Senão, espera 1s.
             const delay = res.status === 429 ? 2000 : 1000;
             await sleep(delay); 
             continue; // Pula para o próximo modelo da lista
           }

           // Sucesso! Salva a resposta e sai do loop de modelos.
           reply = data.choices?.[0]?.message?.content || "Sem resposta.";
           success = true;
           break; 

         } catch (err) {
           // Erro de rede/internet
           lastErrorMsg = err.message;
           console.warn(`[Groq] Erro de rede no ${currentModel}: ${err.message}`);
           await sleep(1000); // Respiro de 1s antes de tentar o próximo
           continue;
         }
       }
       
       // Se teve sucesso, sai do loop de ciclos e continua o fluxo normal do app
       if (success) break;

       // Se chegou aqui, a lista toda falhou. Se ainda tiver ciclos sobrando, dá um respiro longo.
       if (!success && ciclo < MAX_CYCLOS) {
         console.warn(`[Groq] Todos os modelos falharam no Ciclo ${ciclo}. Aguardando 3s antes de tentar novamente...`);
         await sleep(3000); 
       }
     }

     // Se tentou todos os modelos, em todos os ciclos, e nenhum funcionou
     if (!success) {
       throw new Error(`Tentativas esgotadas. Último erro da API: ${lastErrorMsg}`);
     }

     // 3. PROCESSAMENTO DA RESPOSTA (Atualizado com Exercícios)
     const suggestedDose = extractDose(reply);
     const pendingCarbs = extractCarbs(reply);
     const exerciseData = extractExercise(reply);

     // Se a IA detectou APENAS um exercício (sem comida envolvida)
     if (exerciseData && suggestedDose === null && pendingCarbs === null) {
       const exHid = Date.now().toString();
       const exRec = {
         id: exHid, datetime: fmtDateTime(), meal: `🏃 ${EXERCISE_PROFILES[exerciseData.type]?.label} (${exerciseData.duration} min)`,
         carbs: 0, suggestedDose: 0, appliedDose: 0, appliedAt: Date.now(), glucoseBefore: glucose?.glucose||null, carbType: exerciseData.type
       };
       setHist(p=>[...p,exRec]);
       sbUpsertMeal(exRec);
       setMsgs(p=>[...p,{role:"assistant",content:`✅ **Exercício salvo no histórico!**\n\n${reply}\n\nA redução gradual de sensibilidade já está ativa para suas próximas refeições.`,time:fmtTime()}]);
       setLoad(false);
       return;
     }

     // Registra refeição pendente se há dose ou carbos
     if(suggestedDose != null || pendingCarbs){
       const hid=Date.now().toString();
       const pendingRec={
         id:hid, datetime:fmtDateTime(), meal:text?.slice(0,80)||(userMsg.images.length?"(imagem)":"Refeição"),
         carbs:pendingCarbs, suggestedDose:suggestedDose??0, appliedDose:undefined, glucoseBefore:glucose?.glucose||null
       };
       setHist(p=>[...p,pendingRec]);
       sbUpsertMeal(pendingRec); 
       setPending(hid);
       
       // Bônus: Se você comeu E treinou e mandou tudo na mesma mensagem
       if (exerciseData) {
         const exHid = (Date.now()-1000).toString();
         const exRec = { id:exHid, datetime:fmtDateTime(), meal: `🏃 ${EXERCISE_PROFILES[exerciseData.type]?.label} (${exerciseData.duration} min)`, carbs:0, suggestedDose:0, appliedDose:0, appliedAt:Date.now(), glucoseBefore:null, carbType: exerciseData.type };
         setHist(p=>[...p,exRec]);
         sbUpsertMeal(exRec);
       }
     }

     setMsgs(p=>[...p,{role:"assistant",content:reply,time:fmtTime(),suggestedDose,pendingCarbs}]);
     
   } catch(e) {
     setMsgs(p=>[...p,{role:"assistant",content:`❌ **Erro Groq:** ${e.message}\n\nVerifique sua chave em console.groq.com ou sua internet.`,time:fmtTime()}]);
   } finally {
     setLoad(false);
     // T4: drena fila — se o usuário enviou mensagem enquanto processava
     if(queuedMsgRef.current){
       const queued = queuedMsgRef.current;
       queuedMsgRef.current = null;
       setTimeout(()=>send(queued), 300);
     }
   }
 },[input,images,apiKey,buildGroqMsgs,glucose,mealOpen,loading]);

  const onKey=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}};

  if(!apiKey) return (
    <ThemeCtx.Provider value={{dark,toggle:()=>setDark(d=>!d)}}>
      <ApiKeySetup onSave={k=>{lsSet(KEY_APIKEY,k);setApiKey(k);}}/>
    </ThemeCtx.Provider>
  );

  return (
    <SettingsCtx.Provider value={{settings, setSettings}}>
    <ThemeCtx.Provider value={{dark,toggle:()=>setDark(d=>!d)}}>
      <div style={{height:"100vh",display:"flex",flexDirection:"column",background:"var(--bg)",position:"relative",overflow:"hidden"}}>

        {/* HEADER — limpo: logo + biblioteca + offline + tema */}
        <div style={{padding:"0 14px",background:"var(--surface)",borderBottom:"1px solid var(--border)",
          display:"flex",alignItems:"center",gap:"8px",flexShrink:0,
          minHeight:"52px"}}>
          <div style={{width:"32px",height:"32px",borderRadius:"10px",background:"var(--accent)",
            display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,
            boxShadow:"0 2px 8px rgba(13,148,136,.30)"}}>
            <IcoSyringe s={17} c="white"/>
          </div>
          <div style={{flex:1,minWidth:0,overflow:"hidden"}}>
            <div style={{fontWeight:800,fontSize:"14px",color:"var(--text)",letterSpacing:"-0.02em",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>DM1</div>
            <div style={{fontSize:"9px",color:"var(--text3)",fontWeight:500,letterSpacing:"0.03em",whiteSpace:"nowrap"}}>T1 · Libre 2 · Fiasp</div>
          </div>
          <button onClick={()=>setTab(t=>t==="library"?"chart":"library")} aria-label="Biblioteca de Alimentos"
            style={{display:"flex",alignItems:"center",gap:"5px",padding:"6px 10px",
              background:tab==="library"?"var(--accent)":"var(--surface2)",
              border:`1px solid ${tab==="library"?"var(--accent)":"var(--border)"}`,
              borderRadius:"8px",color:tab==="library"?"white":"var(--text2)",
              fontSize:"11px",fontWeight:600,cursor:"pointer",fontFamily:"var(--font)",flexShrink:0,
              minHeight:"36px",touchAction:"manipulation"}}>
            <IcoBook s={14} c={tab==="library"?"white":"var(--text2)"}/>
            <span>Biblioteca</span>
          </button>
          {!isOnline && (
            <div title="Sem conexão" style={{background:"rgba(239,68,68,.12)",border:"1px solid rgba(239,68,68,.35)",
              borderRadius:"20px",padding:"5px 7px",flexShrink:0,display:"flex",alignItems:"center"}}>
              <IcoWifiOff s={14} c="#ef4444"/>
            </div>
          )}
          <ThemeToggle dark={dark} onToggle={()=>setDark(d=>!d)}/>
          <button onClick={()=>setDashOpen(true)} aria-label="Acurácia das Previsões"
            style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"20px",
              padding:"6px 8px",cursor:"pointer",display:"flex",alignItems:"center",
              minHeight:"36px",touchAction:"manipulation"}}>
            <IcoBarChart s={15} c="var(--text2)"/>
          </button>
          <button onClick={()=>setSettingsOpen(true)} aria-label="Configurações"
            style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"20px",
              padding:"6px 8px",cursor:"pointer",display:"flex",alignItems:"center",
              minHeight:"36px",touchAction:"manipulation"}}>
            <IcoGear s={15} c="var(--text2)"/>
          </button>
        </div>

        {/* ── ALERT QUEUE — 1 alerta por vez, auto-dismiss 2s, cooldown 2min ── */}
        <AlertQueue
          reading={glucose}
          predictions={predictions}
          history={history}
          activeDoses={doses}
          dismissed={dismissed}
          onDismiss={dismissAlert}
          onLogForgottenMeal={logForgottenMeal}
        />

        {/* WIDGET GLICEMIA — compacto */}
        <GlucoseWidget
          reading={glucose} loading={gLoad}
          onRefresh={fetchGlucose}
          activeDoses={doses}
          tirStats={tirStats}
          predictions={predictions}
        />

        {/* GLICEMIA + BIBLIOTECA — chart sempre visível, library como overlay */}
        <div style={{flex:1,position:"relative",minHeight:0,overflow:"hidden",display:"flex",flexDirection:"column",
          paddingBottom:"var(--bar-h)"}}>
          <GlucoseChart glucoseData={glucose} history={history} activeDoses={doses} onRowsUpdate={r=>chartRowsRef.current=r}/>
          {tab==="library" && (
            <div style={{position:"absolute",inset:0,background:"var(--bg)",zIndex:10,overflow:"auto"}}>
              {/* header da biblioteca */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px 6px",
                borderBottom:"1px solid var(--border)",background:"var(--surface)",flexShrink:0}}>
                <div style={{fontSize:"13px",fontWeight:700,color:"var(--text)",display:"flex",alignItems:"center",gap:"6px"}}>
                  <IcoBook s={15} c="var(--text)"/> Biblioteca de Alimentos
                </div>
                <button onClick={()=>setTab("chart")} aria-label="Fechar biblioteca"
                  style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"8px",
                    width:"36px",height:"36px",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
                  <IcoX s={16} c="var(--text3)"/>
                </button>
              </div>
              {(()=>{
                const totalIOBNow = calcTotalIOB(filterDoses(doses));
                const pred60val   = predictions.find(p=>p.t===60)?.value;
                return (
                  <LibraryView library={library}
                    onUse={item=>{
                      if(item.saveOnly){
                        const newItem = {id: Date.now().toString(), name:item.name, carbs:item.carbs, description:item.description||""};
                        setLib(p=>[...p, newItem]);
                        sbUpsertLibraryItem(newItem);
                        return;
                      }
                      setInput(`${item.name}${item.description?` (${item.description})`:""} — ${item.carbs}g CHO`);
                      setMealOpen(true);
                      setTab("chart");
                      setTimeout(()=>taRef.current?.focus(),300);
                    }}
                    onDelete={i=>{
                      const item = library[i];
                      setLib(p=>p.filter((_,j)=>j!==i));
                      if(item?.id) sbDeleteLibraryItem(item.id);
                    }}
                  />
                );
              })()}
            </div>
          )}
        </div>

        {/* MODAL REFEIÇÃO */}
        {(()=>{
          const totalIOBNow = calcTotalIOB(filterDoses(doses));
          const pred60val   = predictions.find(p=>p.t===60)?.value;
          return (
            <MealModal
              open={mealOpen}
              onClose={()=>setMealOpen(false)}
              msgs={msgs}
              loading={loading}
              timers={timers}
              input={input}
              setInput={setInput}
              images={images}
              setImages={setImages}
              onSend={send}
              onKey={onKey}
              onApplyDose={(u,s,ct)=>registerDose(u>0?u:null,s,undefined,undefined,ct)}
              onUpdateCarbs={updatePendingCarbs}
              onDismissTimer={id=>setTimers(p=>p.map(t=>t.id===id?{...t,dismissed:true}:t))}
              fileRef={fileRef}
              taRef={taRef}
              history={history}
              onUpdateHistory={updateHistRecord}
              onDeleteHistory={deleteHistRecord}
              totalIOB={totalIOBNow}
              pred60={pred60val}
            />
          );
        })()}

        {(()=>{
          const totalIOBNow = calcTotalIOB(filterDoses(doses));
          const pred60val   = predictions.find(p=>p.t===60)?.value;
          return <FAB onRegisterDose={(u,n)=>registerDose(u,null,"Dose avulsa",n)} totalIOB={totalIOBNow} pred60={pred60val}
            open={fabOpen} onClose={()=>setFabOpen(false)}/>;
        })()}

        {/* ── BOTTOM ACTION BAR — barra fixa com ações principais ── */}
        <div style={{position:"fixed",bottom:0,left:0,right:0,height:"var(--bar-h)",
          background:"var(--surface)",borderTop:"1px solid var(--border)",
          display:"flex",alignItems:"stretch",zIndex:100,
          backdropFilter:"blur(12px)"}}>
          <button className="bottom-bar-btn" onClick={()=>{setInput(""); setMealOpen(true);}} aria-label="Refeição / Treino">
            <div style={{display:"flex", alignItems:"center", gap:"6px", marginBottom:"2px"}}>
              <IcoUtensils s={19} c="var(--text2)"/>
              <IcoActivity s={19} c="var(--text2)"/>
            </div>
            <span>Refeição / Treino</span>
          </button>
          <div style={{width:"1px",background:"var(--border)",margin:"10px 0"}}/>
          <button className="bottom-bar-btn" onClick={()=>setFabOpen(true)} aria-label="Dose Insulina">
            <IcoSyringe s={22} c="var(--text2)"/>
            <span>Dose avulsa</span>
          </button>
        </div>
      </div>
      <DashboardModal open={dashOpen}     onClose={()=>setDashOpen(false)}/>
      <SettingsModal  open={settingsOpen} onClose={()=>setSettingsOpen(false)}/>
    </ThemeCtx.Provider>
    </SettingsCtx.Provider>
  );
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(() => console.log('Service Worker registrado!'))
      .catch(err => console.log('SW falhou:', err));
  });
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
