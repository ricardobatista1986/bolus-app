const migrateSettings = (raw) => {
  if (!raw) return null;

  // formato legado → converter
  return {
    icrRanges: [

      { id: "2", start: "18:00", end: "23:00", icr: raw.icrNoiteSemana  ?? 6 },

    corrTarget:   raw.corrTarget   ?? 110,
    corrPostMeal: raw.corrPostMeal ?? 160,
  };
};

// Retorna o ICR (g CHO/U) para um dado horário (h=0-23, m=0-59)
const getICR = (h, m, ranges) => {
  if (!ranges?.length) return 5;
  const cur = h * 60 + m;
  for (const r of ranges) {
    const [sh, sm] = r.start.split(":").map(Number);
    const [eh, em] = r.end.split(":").map(Number);
    const s = sh * 60 + sm, e = eh * 60 + em;
    if (s < e) { if (cur >= s && cur < e) return r.icr; }
    else        { if (cur >= s || cur < e) return r.icr; } // cruza meia-noite
  }
  return ranges[0].icr; // fallback: primeira faixa
};

CRÍTICO: A linha **Arredondado: Xu** é OBRIGATÓRIA. Nunca omita.`;

/* ── UTILS ─────────────────────────────────────────────────────────────── */
const lsGet = k => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):null; } catch{return null;} };
const lsSet = (k,v) => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} };
const fmtTime     = (d=new Date()) => d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
const fmtDate     = (d=new Date()) => d.toLocaleDateString("pt-BR",{day:"2-digit",month:"2-digit",year:"2-digit"});
const fmtDateTime = (d=new Date()) => `${fmtDate(d)} ${fmtTime(d)}`;
const sleep       = ms => new Promise(r => setTimeout(r, ms));

/* ── IOB LOGIC — curva triangular assimétrica (Fiasp) ───────────────────
 *  onset=10min → pico absorção=70min → duração=240min
 *  A curva descreve a TAXA de absorção; IOB = fração ainda não absorvida.
 *  Nos primeiros 10min nada é absorvido (IOB=100%) — comportamento
 *  conservador que evita empilhamento precoce de doses.
 * ─────────────────────────────────────────────────────────────────────── */
const fiaspFracRemaining = e => {
  // e = minutos decorridos desde a injeção
  if(e <= 0)             return 1;
  if(e >= FIASP_DIA)     return 0;
  if(e <= FIASP_ONSET)   return 1; // onset: nada absorvido ainda
  const D = FIASP_DIA  - FIASP_ONSET; // 230
  const P = FIASP_PEAK - FIASP_ONSET; // 60
  let absorbed;
  if(e <= FIASP_PEAK){
    const r = e - FIASP_ONSET;
    absorbed = (r*r) / (D*P);
  } else {
    const r    = e - FIASP_PEAK;
    const tail = FIASP_DIA - FIASP_PEAK; // 170
    absorbed   = (P/D) + (2/D) * (r - (r*r)/(2*tail));
  }
  return Math.max(0, 1 - absorbed);
};
const calcIOB       = (units, at) => { if(!units||!at) return 0; return +(units * fiaspFracRemaining((Date.now()-at)/60000)).toFixed(2); };
const calcTotalIOB  = doses => !doses?.length ? 0 : +doses.reduce((s,d)=>s+calcIOB(d.units,d.appliedAt),0).toFixed(1);
const calcRemMin    = at => Math.max(0, Math.round(FIASP_DIA-(Date.now()-at)/60000));
const calcEndTime   = at => at ? new Date(at+FIASP_DIA*60000) : null;
const filterDoses   = doses => (doses||[]).filter(d => calcRemMin(d.appliedAt)>0);

/* ── CARBS ACTIVE LOGIC — curva triangular parametrizada (M2) ───────────
 *  Tipo de refeição define curva de absorção por dose individual.
 *  Constantes globais CHO_* mantidas para retrocompat (fallback = fast).
 * ─────────────────────────────────────────────────────────────────────── */
const CHO_TYPES = {
  fast:   { emoji:"🍎", label:"Rápido",  onset:10, peak:45,  dia:120 }, // frutas, sucos, pão branco
  normal: { emoji:"🍚", label:"Normal",  onset:10, peak:60,  dia:180 }, // arroz, macarrão, feijão
  slow:   { emoji:"🍕", label:"Lento",   onset:15, peak:90,  dia:240 }, // pizza, gordurosa, mista
};
const choFracRemainingDyn = (e, onset, peak, dia) => {
  if(e <= 0)      return 1;
  if(e >= dia)    return 0;
  if(e <= onset)  return 1;
  const D = dia  - onset;
  const P = peak - onset;
  let absorbed;
  if(e <= peak){
    const r = e - onset;
    absorbed = (r*r) / (D*P);
  } else {
    const r    = e - peak;
    const tail = dia - peak;
    absorbed   = (P/D) + (2/D) * (r - (r*r)/(2*tail));
  }
  return Math.max(0, 1 - absorbed);
};
// Alias retrocompat (fast = padrão histórico)
const choFracRemaining = e => choFracRemainingDyn(e, CHO_ONSET, CHO_PEAK, CHO_DIA);

const calcActiveCarbs = (carbs, at, carbType='fast') => {
  if(!carbs || !at) return 0;
  const {onset, peak, dia} = CHO_TYPES[carbType] || CHO_TYPES.fast;
  return Math.round(carbs * choFracRemainingDyn((Date.now()-at)/60000, onset, peak, dia));
};
const calcTotalActiveCarbs = doses => !doses?.length ? 0 :
  Math.max(0, doses.reduce((s,d) => s + calcActiveCarbs(d.carbs||0, d.appliedAt, d.carbType||'fast'), 0));
const maxCarbsRemMin = doses => {
  const active = (doses||[]).filter(d => (d.carbs||0)>0 && calcActiveCarbs(d.carbs, d.appliedAt, d.carbType||'fast')>0);
  if(!active.length) return 0;
  return Math.max(...active.map(d => {
    const {dia} = CHO_TYPES[d.carbType||'fast'] || CHO_TYPES.fast;
    return Math.max(0, dia - Math.round((Date.now()-d.appliedAt)/60000));
  }));
};

/* ── PREDICTION MODEL — calibrated from 4 years of LibreView data ────────── */
// Velocity (mg/dL/min) — derived from 131k consecutive readings
const TREND_VEL_MAP = {
  "⬆️":2.8,"↑":2.8, "↗️":0.88, "➡️":0.0,"→":0.0, "↘️":-0.85, "⬇️":-2.8,"↓":-2.8
};
// Circadian baseline velocity by hour (mg/dL/min) — calibrated from data
const DAWN_VEL = {
  0:-0.17,1:-0.04,2:0.07,3:0.13,4:0.12,5:0.13,
  6:0.15,7:0.12,8:0.19,9:-0.44,10:-0.29,11:-0.12,
  12:-0.10,13:0.28,14:0.42,15:-0.23,16:-0.04,17:0.11,
  18:-0.17,19:-0.17,20:0.02,21:0.14,22:0.01,23:-0.17
};
// Empirical autocorrelation from data (how much trend persists at each horizon)
const AUTOCORR = {15:0.904,30:0.891,45:0.807,60:0.743,75:0.676,90:0.610};

const getTrendVel = emoji => {
  for(const [k,v] of Object.entries(TREND_VEL_MAP)) if(emoji?.includes(k)) return v;
  return 0;
};
const calcIOBAt = (units,at,futMs) => {
  if(!units||!at) return 0;
  return +(units * fiaspFracRemaining((futMs-at)/60000)).toFixed(2);
};
const calcTotalIOBAt = (doses,futMs) =>
  !doses?.length ? 0 : +doses.reduce((s,d)=>s+calcIOBAt(d.units,d.appliedAt,futMs),0).toFixed(1);
const calcCOBAt = (carbs, at, futMs, carbType='fast') => {
  if(!carbs||!at) return 0;
  const {onset, peak, dia} = CHO_TYPES[carbType] || CHO_TYPES.fast;
  return carbs * choFracRemainingDyn((futMs-at)/60000, onset, peak, dia);
};
const calcTotalCOBAt = (doses, futMs) =>
  !doses?.length ? 0 : Math.max(0, doses.reduce((s,d)=>s+calcCOBAt(d.carbs||0, d.appliedAt, futMs, d.carbType||'fast'), 0));

/**
 * Uncertainty band: widens with time horizon and trend velocity.
 * The emoji-based velocity is already smoothed by Libre's internal algorithm,
 * so it's more reliable than raw delta between sparse readings.
 * Band values are conservative — meant for visual reference, not clinical precision.
 */
const predUncertainty = (t, vel) => {
  // Base from empirical autocorrelation decay (133k readings):
  // r=0.891 at 30min → ~18 mg/dL 1-sigma | r=0.610 at 90min → ~38 mg/dL
  const base = {15:12, 30:18, 45:24, 60:30, 75:34, 90:38}[t] || 20;
  // Scale by velocity magnitude: fast-moving glucose = less predictable
  const velFactor = 1 + Math.min(1.8, Math.abs(vel) * 0.35);
  return Math.round(base * velFactor);
};

/**
 * Returns 6 prediction points (+15m to +90m, every 15min)
 * { t, value, low, high, timestamp, zone }
 * Velocity source: getTrendVel(emoji) — Libre's own smoothed signal,
 * more reliable than raw delta between 15-min readings (noisy).
 */
const predictGlucose = (currentG, trendEmoji, activeDoses, dark, nowMs=Date.now()) => {
  if(!currentG||currentG<=0) return [];
  const ISF=30, live=filterDoses(activeDoses);
  const vel = getTrendVel(trendEmoji); // calibrated from 133k readings
  const results=[];
  for(let t=15;t<=90;t+=15){
    const futMs=nowMs+t*60000;
    const futH=new Date(futMs).getHours();
    // Trend with autocorrelation decay (persistence weakens beyond 60min)
    const trendDelta = vel * t * (AUTOCORR[t]||0.5);
    // Insulin: IOB consumed between now and t → glucose drops
    const iobDecayed = Math.max(0, calcTotalIOBAt(live,nowMs) - calcTotalIOBAt(live,futMs));
    const insulinDelta = -iobDecayed * ISF;
    // Carbs: COB absorbed between now and t → glucose rises
    const cobAbsorbed = Math.max(0, calcTotalCOBAt(live,nowMs) - calcTotalCOBAt(live,futMs));
    const nowH = new Date(nowMs).getHours();
    const nowM = new Date(nowMs).getMinutes();
    const ICR = getICR(nowH, nowM, appSettings.icrRanges);
    const carbDelta = cobAbsorbed * (ISF/ICR);
    // Circadian residual at 30% (trend already carries most of it)
    const dawnDelta = (DAWN_VEL[futH]||0) * t * 0.3;
    const raw = currentG + trendDelta + insulinDelta + carbDelta + dawnDelta;
    const value = Math.max(40, Math.min(400, Math.round(raw)));
    // Uncertainty band
    const sigma = predUncertainty(t, vel);
    const low  = Math.max(40,  Math.round(raw - sigma));
    const high = Math.min(400, Math.round(raw + sigma));
    results.push({t, value, low, high, timestamp:futMs, zone:getZone(value,dark||false)});
  }
  return results;
};

/* ── MIGRATION ─────────────────────────────────────────────────────────── */

};

const renderMD = text => {
  if(!text) return "";
  let out = text
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.*?)\*/g,"<em>$1</em>")
    .replace(/`(.*?)`/g,"<code>$1</code>");

  // Build tables: collect consecutive pipe lines (header, separator, rows)
  out = out.replace(/((?:\|.+\|\n?)+)/g, block => {
    const lines = block.trim().split("\n").filter(l=>l.includes("|"));
    const rows = [];
    let headerDone = false;
    for(const line of lines) {
      if(/^\s*\|[\s\-|:]+\|\s*$/.test(line)) { headerDone = true; continue; } // separator
      const cells = line.split("|").filter(Boolean).map(c=>c.trim());
      rows.push({cells, isHeader: rows.length===0 && !headerDone});
    }
    if(!rows.length) return block;
    const thead = rows[0] ? `<thead><tr>${rows[0].cells.map(c=>`<th>${c}</th>`).join("")}</tr></thead>` : "";
    const tbody = rows.slice(1).map(r=>`<tr>${r.cells.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("");
    return `<table>${thead}<tbody>${tbody}</tbody></table>`;
  });

  out = out.replace(/\n/g,"<br/>");
  // Clean up <br/> that landed inside table tags
  out = out.replace(/<table>(.*?)<\/table>/gs, m => m.replace(/<br\/>/g,""));
  return out;
};

/* ── EXTRACT CARBS — multiple patterns for LLM output variance ─────────── */
const extractCarbs = text => {
  if(!text) return null;
  // Suporta decimais: 21,5g / 21.5g -- normaliza virgula para ponto
  const parseG = s => { const v = parseFloat(s.replace(",",".")); return isNaN(v)?null:Math.round(v); };
  const pats = [
    /\*{0,2}Total[:\s*]+(\d+(?:[.,]\d+)?)\s*g\*{0,2}/i,
    /Total\s*(?:CHO|de\s+carboidratos)?[:\s]+(\d+(?:[.,]\d+)?)\s*g/i,
    /Total[^0-9]{0,15}(\d+(?:[.,]\d+)?)\s*g\s*CHO/i,
    /CHO\s*total[:\s]+(\d+(?:[.,]\d+)?)\s*g/i,
    /(\d+(?:[.,]\d+)?)\s*g\s*(?:de\s*)?(?:CHO|carboidratos?)(?:\s+total)?/i,
  ];
  for(const p of pats){ const m=text.match(p); if(m){const v=parseG(m[1]);if(v&&v>0&&v<=300)return v;} }
  return null;
};

/* ── EXTRACT DOSE — 6 patterns ─────────────────────────────────────────── */
const extractDose = text => {
  if(!text) return null;
  // Padrões de dose zero — IA indicando não aplicar (hipo, COB suficiente, etc)
  const zeroPatterns = [
    /dose\s+sugerida[^0-9]{0,15}0\s*[Uu]\b/i,
    /arredondado[^0-9]{0,10}0\s*[Uu]\b/i,
    /\*\*0\s*[Uu]\b/,
    /não\s+(?:aplicar|usar|injetar)\s+insulina/i,
    /sem\s+(?:necessidade\s+de\s+)?(?:dose|insulina)/i,
    /glicemia\s+baixa[^.]{0,60}(?:não|sem)\s+(?:dose|insulina)/i,
  ];
  for(const p of zeroPatterns){ if(p.test(text)) return 0; }
  // Padrões de dose positiva
  const pats = [
    /\*\*Arredondado:\s*(\d{1,2})\s*[Uu]\b/,
    /Arredondado[^0-9]{0,10}(\d{1,2})\s*[Uu]\b/i,
    /\*\*Dose\s+sugerida:\s*(\d{1,2})\s*[Uu]\b/i,
    /Dose\s+sugerida[^0-9]{0,10}(\d{1,2})\s*[Uu]\b/i,
    /aplicar\s+(\d{1,2})\s*[Uu]\b/i,
    /\b(\d{1,2})\s*[Uu]\s*(?:de\s+)?insulina\b/i,
  ];
  for(const p of pats){ const m=text.match(p); if(m){const v=parseInt(m[1]);if(v>0&&v<=30)return v;} }
  return null;
};

const compressDataUrl = dataUrl => new Promise(resolve => {
  const img = new Image();
  img.onload = () => {
    try {
      const MAX=1024,s=Math.min(1,MAX/Math.max(img.width||MAX,img.height||MAX));
      const w=Math.max(1,Math.round((img.width||MAX)*s)),h=Math.max(1,Math.round((img.height||MAX)*s));
      const c=document.createElement("canvas");c.width=w;c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      resolve(c.toDataURL("image/jpeg",.75));
    } catch{resolve(dataUrl);}
  };
  img.onerror = () => resolve(dataUrl);
  img.src = dataUrl;
});

      <p style={{fontSize:"13px",color:"var(--text2)",marginBottom:"6px",textAlign:"center"}}>Cole sua chave da API Groq (gratuita)</p>
      <p style={{fontSize:"11px",color:"var(--text3)",marginBottom:"28px",textAlign:"center"}}>
        Crie conta em <strong style={{color:"var(--accent)"}}>console.groq.com</strong> → API Keys → Create API Key
      </p>
      <div className="card" style={{width:"100%",maxWidth:"380px",padding:"24px"}}>
        <input value={val} onChange={e=>setVal(e.target.value)} onKeyDown={e=>e.key==="Enter"&&val.trim()&&onSave(val.trim())}
          placeholder="gsk_..." type="password"
          style={{width:"100%",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"10px",padding:"12px 14px",color:"var(--text)",fontSize:"14px",marginBottom:"12px",fontFamily:"var(--mono)"}}/>
        <button className="btn btn-primary" onClick={()=>val.trim()&&onSave(val.trim())} style={{width:"100%",padding:"12px"}}>
          Entrar
        </button>
      </div>
      <p style={{fontSize:"11px",color:"var(--text3)",marginTop:"16px",textAlign:"center"}}>Chave salva localmente. Nunca enviada a terceiros.</p>
    </div>
  );
}

/* ── CIRCULAR GLUCOSE WIDGET — compact, side-by-side layout ────────────── */
function GlucoseWidget({reading, loading, onRefresh, activeDoses, tirStats, predictions}) {
  const {dark} = useContext(ThemeCtx);
  const [,tick] = useState(0);
  useEffect(()=>{ const id=setInterval(()=>tick(t=>t+1),30000); return()=>clearInterval(id); },[]);

  // alertas no AlertQueue (topo da app)

  const live        = filterDoses(activeDoses);
  const totalIOB    = calcTotalIOB(live);
  const totalCarbs  = Math.max(0, calcTotalActiveCarbs(live));
  const latest      = live.length ? live.reduce((a,b)=>a.appliedAt>b.appliedAt?a:b) : null;
  const iobRem      = latest ? calcRemMin(latest.appliedAt) : 0;
  const carbRem     = maxCarbsRemMin(live);
  const iobStr      = () => { const h=Math.floor(iobRem/60),m=iobRem%60; return h>0?`${h}h${m>0?String(m).padStart(2,"0")+"m":""}`:  `${m}m`; };
  const carbRemStr  = () => { const h=Math.floor(carbRem/60),m=carbRem%60; return h>0?`${h}h${m>0?String(m).padStart(2,"0")+"m":""}`:  `${m}m`; };

  // Ring geometry — R=65, CX=75 para caber no layout compacto
  const R=65, CX=75, CY=75, SW=12, C=2*Math.PI*R;
  const tir = tirStats?.tir ?? 0;
  const tbr = tirStats?.tbr ?? 0;
  const tar = tirStats?.tar ?? 0;
  const hasTIR = tirStats !== null;
  const tirColor = t => t>=70?"#16a34a":t>=50?"#ca8a04":"#ef4444";

  const trendToDeg = emoji => {
    const m = {"⬆️":0,"↑":0,"↗️":45,"➡️":90,"→":90,"↘️":135,"⬇️":180,"↓":180};
    for(const [k,v] of Object.entries(m)) if(emoji?.includes(k)) return v;
    return 90;
  };

  if(loading) return (
    <div style={{margin:"10px 14px 0"}}>
      <div className="card" style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:"10px"}}>
        <div style={{width:"8px",height:"8px",borderRadius:"50%",background:"var(--accent)",animation:"pulse 1.2s ease-in-out infinite"}}/>
        <span style={{fontSize:"13px",color:"var(--text2)"}}>Lendo sensor...</span>
        {totalIOB>0&&<div style={{marginLeft:"auto",fontSize:"13px",fontWeight:700,color:"var(--accent)"}}>💉 {totalIOB}U IOB</div>}
      </div>
    </div>
  );

  if(!reading||reading.error) return (
    <div className="card" style={{margin:"10px 14px 0",padding:"12px 16px",display:"flex",alignItems:"center",gap:"10px",background:"rgba(239,68,68,.06)",borderColor:"rgba(239,68,68,.2)",cursor:"pointer"}} onClick={onRefresh}>
      <span>⚠️</span>
      <span style={{fontSize:"12px",color:"#ef4444",flex:1}}>{reading?.error?.includes("Proxy")||reading?.error?.includes("fetch")?"Proxy offline":reading?.error||"Sensor desconectado"}</span>
      {totalIOB>0&&<div style={{fontSize:"12px",fontWeight:700,color:"var(--accent)"}}>💉 {totalIOB}U IOB</div>}
      <span style={{fontSize:"11px",color:"var(--accent)"}}>↺</span>
    </div>
  );

  const g    = reading.glucose;
  const zone = getZone(g, dark);
  const deg  = trendToDeg(reading.trendEmoji);

  // Seta maior (ah=18 vs 11 anterior)
  const ArrowSVG = ({cx,cy,color,rot}) => {
    const ah=18, aw=8;
    return (
      <g transform={`rotate(${rot} ${cx} ${cy})`}>
        <line x1={cx} y1={cy+ah/2} x2={cx} y2={cy-ah/2} stroke={color} strokeWidth="3" strokeLinecap="round"/>
        <polyline points={`${cx-aw},${cy-ah/2+aw} ${cx},${cy-ah/2} ${cx+aw},${cy-ah/2+aw}`}
          fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
      </g>
    );
  };

  return (
    /* Wrapper relativo: card tem altura fixa, alertas flutuam em overlay sobre o chart */
    <div style={{margin:"4px 14px 0", flexShrink:0}} onClick={onRefresh}>

      {/* ── CARD principal — altura nunca muda com alertas ── */}
      <div className="card" style={{
        padding:"7px 14px",
        cursor:"pointer", transition:"all .3s",
        borderColor:zone.border, background:zone.bg
      }}>
        {/* Layout compacto: info-esq | círculo | info-dir */}
        <div style={{display:"flex",alignItems:"center",gap:"8px"}}>

          {/* Esquerda: zona + tendência */}
          <div style={{flex:1,minWidth:0,textAlign:"right"}}>
            <div style={{fontSize:"12px",fontWeight:700,color:zone.color,lineHeight:1.3}}>{reading.stale?"⚠️ desatual.":zone.label}</div>
            <div style={{fontSize:"10px",color:"var(--text3)",marginTop:"2px"}}>{reading.trendText||"estável"}</div>
          </div>

          {/* Centro: círculo SVG — inalterado */}
          <div style={{position:"relative",display:"inline-block",flexShrink:0}}>
            <svg width={CX*2} height={CY*2} style={{display:"block",overflow:"visible"}}>
              <circle cx={CX} cy={CY} r={R} fill="none"
                stroke={dark?"rgba(255,255,255,.13)":"rgba(0,0,0,.07)"} strokeWidth={SW}/>
              {hasTIR && tir+tbr+tar>0 ? (<>
                {tbr>0&&<circle cx={CX} cy={CY} r={R} fill="none" stroke="#ef4444" strokeWidth={SW} strokeLinecap="butt"
                  strokeDasharray={`${tbr/100*C} ${C}`} strokeDashoffset={0}
                  transform={`rotate(-90 ${CX} ${CY})`}/>}
                {tir>0&&<circle cx={CX} cy={CY} r={R} fill="none" stroke="#16a34a" strokeWidth={SW} strokeLinecap="butt"
                  strokeDasharray={`${tir/100*C} ${C}`} strokeDashoffset={`${-(tbr/100*C)}`}
                  transform={`rotate(-90 ${CX} ${CY})`}/>}
                {tar>0&&<circle cx={CX} cy={CY} r={R} fill="none" stroke="#ca8a04" strokeWidth={SW} strokeLinecap="butt"
                  strokeDasharray={`${tar/100*C} ${C}`} strokeDashoffset={`${-((tbr+tir)/100*C)}`}
                  transform={`rotate(-90 ${CX} ${CY})`}/>}
              </>) : (
                <circle cx={CX} cy={CY} r={R} fill="none" stroke={zone.color} strokeWidth={SW}
                  strokeLinecap="round" opacity={0.25} strokeDasharray={`${C} ${C}`}
                  transform={`rotate(-90 ${CX} ${CY})`}/>
              )}
              <text x={CX} y={CY-6} textAnchor="middle" dominantBaseline="auto"
                fontSize="42" fontWeight="800" fill={zone.color}
                fontFamily="'DM Mono',monospace" letterSpacing="-2">{g}</text>
              <text x={CX} y={CY+10} textAnchor="middle"
                fontSize="9" fill={dark?"rgba(255,255,255,.38)":"#94a3b8"}
                fontFamily="'Outfit',sans-serif" fontWeight="500">mg/dL</text>
              <ArrowSVG cx={CX} cy={CY+28} color={zone.color} rot={deg}/>
            </svg>
            {hasTIR && (
              <div style={{position:"absolute",bottom:"-2px",left:"50%",transform:"translateX(-50%)",
                background:"var(--surface)",border:`1.5px solid ${tirColor(tir)}`,borderRadius:"20px",
                padding:"1px 7px",whiteSpace:"nowrap",boxShadow:"var(--shadow-sm)"}}>
                <span style={{fontSize:"10px",fontWeight:700,color:tirColor(tir),fontFamily:"var(--mono)"}}>{tir}%</span>
                <span style={{fontSize:"9px",color:"var(--text3)",marginLeft:"3px"}}>TIR 8h</span>
              </div>
            )}
          </div>

          {/* Direita: IOB + carbos ativos, com codificação de risco */}
          <div style={{flex:1,minWidth:0,textAlign:"left"}}>
            {totalIOB>0&&iobRem>0 ? (()=>{
              // Risco: <1U cinza, 1-2U accent, >2U vermelho com pulso
              const iobColor = totalIOB < 1 ? "var(--text3)" : totalIOB < 2 ? "var(--accent)" : "#ef4444";
              const iobBorder = totalIOB > 2 ? "1px solid rgba(239,68,68,.4)" : "none";
              const iobBg = totalIOB > 2 ? "rgba(239,68,68,.08)" : "transparent";
              return (<>
                <div style={{background:iobBg,border:iobBorder,borderRadius:"7px",padding:totalIOB>2?"3px 5px":"0",
                  animation:totalIOB>2?"pulse 2s ease-in-out infinite":undefined,display:"inline-block"}}>
                  <div style={{fontSize:"12px",fontWeight:700,color:iobColor,fontFamily:"var(--mono)",display:"flex",alignItems:"center",gap:"4px"}}>
                    <IcoSyringe s={12} c={iobColor}/> {totalIOB}U
                  </div>
                  <div style={{fontSize:"10px",color:"var(--text3)"}}>{iobStr()} IOB</div>
                </div>
                {totalCarbs>0 && (
                  <div style={{marginTop:"4px"}}>
                    <div style={{fontSize:"11px",fontWeight:600,color:"#16a34a",display:"flex",alignItems:"center",gap:"3px"}}>
                      <IcoUtensils s={11} c="#16a34a"/>{totalCarbs}g
                    </div>
                    <div style={{fontSize:"9px",color:"var(--text3)"}}>{carbRemStr()} restante</div>
                  </div>
                )}
              </>);
            })() : (<>
              <div style={{fontSize:"10px",color:"var(--text3)"}}>Sem IOB</div>
              {totalCarbs>0 && (
                <div style={{marginTop:"4px"}}>
                  <div style={{fontSize:"11px",fontWeight:600,color:"#16a34a",display:"flex",alignItems:"center",gap:"3px"}}>
                    <IcoUtensils s={11} c="#16a34a"/>{totalCarbs}g
                  </div>
                  <div style={{fontSize:"9px",color:"var(--text3)"}}>{carbRemStr()} restante</div>
                </div>
              )}
            </>)}
          </div>
        </div>

        <div style={{textAlign:"center",fontSize:"9px",color:"var(--text3)",marginTop:"6px",opacity:.45,display:"flex",alignItems:"center",justifyContent:"center",gap:"4px"}}>
          <IcoRefresh s={11} c="var(--text3)"/> toque para atualizar
        </div>

        {/* ── Prediction badges — sem M5, formato simples ── */}
        {predictions?.length>0 && (() => {
          const p30 = predictions.find(p=>p.t===30);
          const p60 = predictions.find(p=>p.t===60);
          const p90 = predictions.find(p=>p.t===90);
          const hypoAlert = predictions.some(p=>p.t<=60&&p.value<70);
          const hyperAlert = predictions.some(p=>p.t<=60&&p.value>250);
          const purpleColor = dark ? "#BB86FC" : "#8E44AD";
          return (
            <div style={{marginTop:"8px",paddingTop:"8px",borderTop:`1px solid ${zone.border}`}}>
              {(hypoAlert||hyperAlert) && (
                <div style={{
                  background: hypoAlert?"rgba(239,68,68,.15)":"rgba(202,138,4,.12)",
                  border:`1px solid ${hypoAlert?"rgba(239,68,68,.4)":"rgba(202,138,4,.3)"}`,
                  borderRadius:"8px",padding:"4px 10px",marginBottom:"6px",
                  fontSize:"11px",fontWeight:700,
                  color:hypoAlert?"#ef4444":"#ca8a04",textAlign:"center"
                }}>
                  {hypoAlert
                    ? "⚠️ Hipo prevista em ~"+predictions.find(p=>p.value<70)?.t+"min"
                    : "⚠️ Hiper — verifique IOB"}
                </div>
              )}
              <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                <div style={{fontSize:"9px",fontWeight:700,color:purpleColor,whiteSpace:"nowrap",flexShrink:0}}>
                  Previsão:
                </div>
                <div style={{display:"flex",flex:1,gap:"4px"}}>
                  {[p30,p60,p90].filter(Boolean).map(p=>(
                    <div key={p.t} style={{
                      flex:1,textAlign:"center",
                      background: dark ? `${p.zone.color}1a` : `${p.zone.color}15`,
                      border:`1px solid ${p.zone.color}50`,
                      borderRadius:"8px",padding:"4px 2px"
                    }}>
                      <div style={{fontSize:"9px",color:dark?"rgba(255,255,255,.5)":"rgba(0,0,0,.4)",lineHeight:1.3,fontFamily:"var(--mono)"}}>+{p.t}m</div>
                      <div style={{fontSize:"15px",fontWeight:800,color:p.zone.color,fontFamily:"var(--mono)",lineHeight:1.1}}>{p.value}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        })()}
      </div>

    </div>
  );
}

/* ── ALERT QUEUE — 1 alerta por vez, 2s auto-dismiss, 2min cooldown ────────
 *  Prioridade: hipo > variação rápida > hipo noturna > correção > refeição
 *  Auto-dismiss: 2s. Cooldown para reaparecer: 2min se condição persistir.
 *  Dismiss manual: via botão X (hipo/rapid: cooldown 2min; outros: dismissed Set)
 * ─────────────────────────────────────────────────────────────────────────── */
function AlertQueue({reading, predictions, history, activeDoses, dismissed, onDismiss, onLogForgottenMeal}) {
  const {dark} = useContext(ThemeCtx);
  const [fmCarbs, setFmCarbs] = useState("");
  const [fmMins,  setFmMins]  = useState(15);
  const [fmType,  setFmType]  = useState("fast");
  const [fmShow,  setFmShow]  = useState(false);
  const [visibleType, setVisibleType] = useState(null);
  const [exiting,     setExiting]     = useState(false);
  const cooldowns  = useRef({});
  const autoTimer  = useRef(null);
  const exitTimer  = useRef(null);
  const [tick, setTick] = useState(0);

  // --- Cálculo de condições (antes de qualquer hook condicional) ---
  const hasReading = !!(reading?.glucose && !reading?.error);
  const g     = hasReading ? reading.glucose : 0;
  const live  = filterDoses(activeDoses);
  const nowH  = new Date().getHours();
  const vel   = hasReading ? (reading._velocity || 0) : 0;
  const hypoNow       = hasReading && g < 70;
  const rapidVelNow   = hasReading && Math.abs(vel) >= 2.5;
  const sixHAgo       = Date.now() - 6*3600000;
  const lastRealDose  = (history||[])
    .filter(r => r.appliedDose > 0 && r.appliedAt && r.appliedAt >= sixHAgo)
    .sort((a,b) => b.appliedAt - a.appliedAt)[0];
  const minsPostDose  = lastRealDose ? Math.round((Date.now()-lastRealDose.appliedAt)/60000) : null;
  const postMealAlert = hasReading && !hypoNow && g > 160 && minsPostDose !== null && minsPostDose >= 120;
  const nightWindow   = nowH >= 22 || nowH <= 6;
  const nightHypoAlert= hasReading && !hypoNow && nightWindow && predictions?.some(p => p.t >= 60 && p.value < 70);
  const totalCOB      = calcTotalActiveCarbs(live);
  const forgottenAlert= hasReading && !hypoNow && vel >= 1.5 && totalCOB === 0 && !dismissed.has("forgottenMeal");
  const ISF = appSettings.isf, corrTarget = appSettings.corrPostMeal;
  const corrDose = postMealAlert ? Math.max(0, Math.round((g - corrTarget) / ISF)) : null;
  const now = Date.now();
  const candidates = [];
  if (hypoNow)       candidates.push('hypo');
  if (rapidVelNow)   candidates.push('rapid');
  if (nightHypoAlert && !dismissed.has("nightHypo")) candidates.push('nightHypo');
  if (postMealAlert  && !dismissed.has("postMeal"))  candidates.push('postMeal');
  if (forgottenAlert) candidates.push('forgottenMeal');
  const nextType = hasReading
    ? (candidates.find(t => now - (cooldowns.current[t]||0) >= 120000) || null)
    : null;

  // Re-avaliar a cada 30s (para cooldown de 2min expirar)
  useEffect(() => {
    const id = setInterval(() => setTick(t => t+1), 30000);
    return () => clearInterval(id);
  }, []);
  useEffect(() => () => { clearTimeout(autoTimer.current); clearTimeout(exitTimer.current); }, []);

  // Lógica de exibição — TODOS os hooks antes de qualquer return
  useEffect(() => {
    if (!hasReading) { setVisibleType(null); return; }
    if (fmShow) { clearTimeout(autoTimer.current); return; }
    if (!nextType) {
      if (visibleType) {
        setExiting(true);
        exitTimer.current = setTimeout(() => { setVisibleType(null); setExiting(false); }, 150);
      }
      return;
    }
    if (nextType === visibleType) return;
    clearTimeout(autoTimer.current);
    setExiting(false);
    setVisibleType(nextType);
    setFmShow(false);
    autoTimer.current = setTimeout(() => {
      setExiting(true);
      exitTimer.current = setTimeout(() => {
        setVisibleType(null);
        setExiting(false);
        cooldowns.current[nextType] = Date.now();
        setTick(t => t+1);
      }, 150);
    }, 2000);
  }, [nextType, tick, fmShow, hasReading]);

  const dismiss = (type, useParentDismiss=false) => {
    clearTimeout(autoTimer.current);
    clearTimeout(exitTimer.current);
    setVisibleType(null); setExiting(false); setFmShow(false);
    cooldowns.current[type] = Date.now();
    if (useParentDismiss) onDismiss(type);
    setTick(t => t+1);
  };

  if (!hasReading || !visibleType) return null;

  const submitForgotten = () => {
    const c = parseInt(fmCarbs);
    if (!c || c <= 0 || c > 300) return;
    onLogForgottenMeal && onLogForgottenMeal(c, fmMins, fmType);
    dismiss('forgottenMeal', true);
    setFmCarbs("");
  };

  // Estilos base do alerta
  const alertWrap = (bg, border) => ({
    padding: "9px 14px",
    background: bg, borderBottom: `1px solid ${border}`,
    flexShrink: 0,
    animation: exiting ? "alertOut .15s ease forwards" : "alertIn .2s ease forwards",
  });
  const closeBtn = (color, type, useParent=false) => (
    <button onClick={() => dismiss(type, useParent)}
      aria-label="Fechar alerta"
      style={{background:"none",border:"1px solid "+color+"40",borderRadius:"8px",cursor:"pointer",
        color:color,padding:"4px",display:"flex",alignItems:"center",justifyContent:"center",
        flexShrink:0,minWidth:"32px",minHeight:"32px",opacity:.8}}>
      <IcoX s={14} c={color}/>
    </button>
  );

  return (
    <div style={{flexShrink:0}} role="status" aria-live="polite">

      {/* ── Hipoglicemia — máxima prioridade ── */}
      {visibleType === 'hypo' && (
        <div style={{...alertWrap(dark?"#3b0000":"#fef2f2", dark?"rgba(239,68,68,.5)":"rgba(239,68,68,.3)"),
          display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"8px"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:"13px",fontWeight:800,color:"#ef4444",marginBottom:"2px"}}>
              🚨 Hipoglicemia — {g} mg/dL
            </div>
            <div style={{fontSize:"11px",color:dark?"rgba(255,100,100,.9)":"#991b1b",lineHeight:1.4}}>
              <strong>Regra 15-15:</strong> 15g CHO rápido agora.{" "}
              <span style={{opacity:.8}}>Ex: 150ml suco · 3 balas · 1 col. açúcar. Checar em 15min.</span>
            </div>
          </div>
          {closeBtn("#ef4444","hypo")}
        </div>
      )}

      {/* ── Variação rápida ── */}
      {visibleType === 'rapid' && (
        <div style={{...alertWrap(
          vel > 0 ? (dark?"rgba(202,138,4,.12)":"rgba(254,249,195,.9)") : (dark?"rgba(239,68,68,.12)":"rgba(254,226,226,.9)"),
          vel > 0 ? "rgba(202,138,4,.3)" : "rgba(239,68,68,.3)"
        ), display:"flex",alignItems:"center",gap:"8px"}}>
          <span style={{fontSize:"16px"}}>{vel > 0 ? "📈" : "📉"}</span>
          <div style={{flex:1}}>
            <span style={{fontSize:"12px",fontWeight:700,color: vel > 0 ? "#ca8a04" : "#ef4444"}}>
              Variação rápida: {vel > 0 ? "+" : ""}{vel} mg/dL/min
            </span>
            <span style={{fontSize:"10px",color:"var(--text3)",marginLeft:"6px"}}>acompanhe de perto</span>
          </div>
          {closeBtn(vel > 0 ? "#ca8a04" : "#ef4444","rapid")}
        </div>
      )}

      {/* ── Hipo noturna prevista ── */}
      {visibleType === 'nightHypo' && (
        <div style={{...alertWrap(dark?"#200808":"#fff1f2",dark?"rgba(239,68,68,.35)":"rgba(239,68,68,.2)"),
          display:"flex",alignItems:"center",justifyContent:"space-between",gap:"8px"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:"11px",fontWeight:700,color:"#ef4444"}}>
              🌙 Alerta noturno — hipo prevista em {predictions.find(p=>p.t>=60&&p.value<70)?.t}min
            </div>
            <div style={{fontSize:"10px",color:dark?"rgba(255,120,120,.7)":"#991b1b",marginTop:"1px"}}>
              Considere comer algo leve antes de dormir.
            </div>
          </div>
          {closeBtn("#ef4444","nightHypo",true)}
        </div>
      )}

      {/* ── Correção pós-refeição ── */}
      {visibleType === 'postMeal' && (
        <div style={{...alertWrap(dark?"#1a1200":"#fefce8",dark?"rgba(202,138,4,.4)":"rgba(202,138,4,.25)"),
          display:"flex",alignItems:"center",justifyContent:"space-between",gap:"8px"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:"11px",fontWeight:700,color:"#ca8a04"}}>💊 Correção pós-refeição</div>
            <div style={{fontSize:"10px",color:dark?"rgba(255,200,50,.65)":"#92400e",marginTop:"1px"}}>
              {g} mg/dL · alvo {corrTarget} · {minsPostDose}min pós dose
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"8px",flexShrink:0}}>
            {corrDose > 0 && (
              <div style={{background:"rgba(202,138,4,.2)",border:"1px solid rgba(202,138,4,.45)",borderRadius:"8px",padding:"3px 9px",textAlign:"center"}}>
                <div style={{fontSize:"15px",fontWeight:800,color:"#ca8a04",fontFamily:"var(--mono)",lineHeight:1}}>{corrDose}U</div>

/* ── POST MEAL TIMER ────────────────────────────────────────────────────── */
function PostMealTimer({timers,onDismiss}) {
  const [,tick]=useState(0);
  useEffect(()=>{ const id=setInterval(()=>tick(t=>t+1),15000); return()=>clearInterval(id); },[]);
  const active=timers.filter(t=>!t.dismissed); if(!active.length) return null;
  return (
    <div style={{padding:"8px 14px 0"}}>
      {active.map(t=>{
        const rem=90-Math.floor((Date.now()-t.startedAt)/60000), done=rem<=0;
        return (
          <div key={t.id} className="card" style={{padding:"10px 14px",background:done?"rgba(22,163,74,.06)":"rgba(234,179,8,.06)",borderColor:done?"rgba(22,163,74,.25)":"rgba(234,179,8,.25)",display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}}>
            <span style={{fontSize:"16px"}}>{done?"⏰":"⏳"}</span>
            <div style={{flex:1,fontSize:"12px"}}>
              {done?<><strong style={{color:"#16a34a"}}>Hora do check!</strong> Passou 1h30 da dose das {fmtTime(new Date(t.startedAt))}.</>
                   :<><strong style={{color:"#ca8a04"}}>Check pós-refeição</strong> em {rem}min</>}
            </div>
            <button onClick={()=>onDismiss(t.id)} className="btn btn-ghost" style={{padding:"4px 10px",fontSize:"11px"}}>OK</button>
          </div>
        );
      })}
    </div>
  );
}

/* ── DOSE WIDGET — dose diferente + editar carbos + tipo refeição (M2) ──── */
function DoseWidget({suggested, pendingCarbs, onApply, onSkip, onUpdateCarbs, totalIOB, pred60}) {
  const {dark} = useContext(ThemeCtx);
  const [phase,setPhase]       = useState("ask");
  const [alt,setAlt]           = useState("");
  const [carbsVal,setCarbsVal] = useState(String(pendingCarbs||""));
  const [editingCarbs,setEditingCarbs] = useState(false);
  const [carbType,setCarbType] = useState("fast"); // M2: tipo de absorção
  const [done,setDone]         = useState(null);

  // M2: seletor visual de tipo de refeição
  const CarbTypeSelector = () => (
    <div style={{display:"flex",gap:"5px",marginTop:"10px",marginBottom:"4px"}}>
      {Object.entries(CHO_TYPES).map(([key,{emoji,label}]) => (
        <button key={key} onClick={()=>setCarbType(key)}
          style={{flex:1,padding:"5px 4px",borderRadius:"8px",
            border:`1px solid ${carbType===key?"var(--accent)":"var(--border)"}`,
            background:carbType===key?"rgba(14,165,233,.12)":"var(--surface2)",
            color:carbType===key?"var(--accent)":"var(--text3)",
            fontSize:"10px",fontWeight:carbType===key?700:500,
            cursor:"pointer",fontFamily:"var(--font)",transition:"all .15s"}}>
          {emoji} {label}
        </button>
      ))}
    </div>
  );

  if(done!==null) return done>0
    ? <div className="card" style={{marginTop:"10px",padding:"10px 14px",background:"rgba(22,163,74,.08)",borderColor:"rgba(22,163,74,.3)",color:"#16a34a",fontSize:"12px",fontWeight:600}}>✅ {done}U registrada às {fmtTime()}</div>
    : <div className="card" style={{marginTop:"10px",padding:"10px 14px",color:"var(--text3)",fontSize:"12px"}}>⏭️ Dose não registrada</div>;

  // S2: warning de empilhamento — IOB > 2U
  const stackingRisk = totalIOB && totalIOB > 2;

  return (
    <div className="card" style={{marginTop:"10px",padding:"14px"}}>

      {/* S2: Banner de risco de empilhamento */}
      {stackingRisk && (
        <div style={{
          background:dark?"rgba(239,68,68,.12)":"rgba(254,226,226,.8)",
          border:"1px solid rgba(239,68,68,.35)",
          borderRadius:"8px",padding:"8px 10px",marginBottom:"10px",
          fontSize:"11px",color:"#ef4444",lineHeight:1.4
        }}>
          ⚠️ <strong>IOB alto: {totalIOB}U ativos.</strong>{" "}
          {pred60 ? `Previsão +60min: ${pred60} mg/dL.` : ""}{" "}
          Revise se nova dose é necessária.
        </div>
      )}

      {phase==="ask" && <>
        <p style={{fontSize:"12px",color:"var(--text2)",marginBottom:"12px"}}>
          {suggested === 0
            ? <span style={{color:"#ca8a04",fontWeight:700}}>⚠️ Não aplicar insulina — registrar apenas a refeição</span>
            : <><span>💉 Dose sugerida: </span><strong style={{color:"var(--text)",fontSize:"18px",fontFamily:"var(--mono)"}}>{suggested}U</strong></>
          }
          {/* U5: carbos como chip editável inline */}
          {pendingCarbs ? (
            editingCarbs ? (
              <span style={{display:"inline-flex",alignItems:"center",gap:"6px",marginLeft:"8px"}}>
                <input
                  value={carbsVal}
                  onChange={e=>setCarbsVal(e.target.value.replace(/[^0-9]/g,""))}
                  autoFocus
                  onKeyDown={e=>{if(e.key==="Enter"){const c=parseInt(carbsVal);if(c>0){onUpdateCarbs(c);setEditingCarbs(false);}}}}
                  style={{width:"56px",background:"var(--surface2)",border:"1px solid var(--accent)",borderRadius:"8px",padding:"4px 6px",color:"var(--text)",fontSize:"13px",fontFamily:"var(--mono)",textAlign:"center"}}
                />
                <span style={{fontSize:"11px",color:"var(--text3)"}}>g</span>
                <button className="btn btn-primary" style={{padding:"4px 8px",fontSize:"11px"}}
                  onClick={()=>{const c=parseInt(carbsVal);if(c>0){onUpdateCarbs(c);}setEditingCarbs(false);}}>✓</button>
                <button className="btn btn-ghost" style={{padding:"4px 8px",fontSize:"11px"}}
                  onClick={()=>setEditingCarbs(false)}>×</button>
              </span>
            ) : (
              <button onClick={()=>{setCarbsVal(String(pendingCarbs));setEditingCarbs(true);}}
                style={{marginLeft:"8px",background:"var(--surface2)",border:"1px dashed var(--border)",borderRadius:"6px",padding:"2px 8px",fontSize:"11px",color:"var(--text3)",cursor:"pointer",fontFamily:"var(--font)"}}>
                ✎ {pendingCarbs}g CHO
              </button>
            )
          ) : null}
        </p>
        {/* M2 */}
        <CarbTypeSelector/>
        <div style={{display:"flex",gap:"8px",flexWrap:"wrap",marginTop:"8px"}}>
          {suggested === 0 ? (
            <>
              <button className="btn" onClick={()=>{onSkip(carbType);setDone(0);}} style={{background:"#ca8a04",color:"white",flex:1}}>✓ Registrar refeição (sem dose)</button>
              <button className="btn btn-ghost" onClick={()=>setPhase("different")} style={{color:"#ea580c",borderColor:"rgba(234,88,12,.3)"}}>Aplicar dose mesmo assim</button>
            </>
          ) : (
            <>
              <button className="btn" onClick={()=>{onApply(suggested,carbType);setDone(suggested);}} style={{background:"#16a34a",color:"white",flex:1}}>✓ Aplicar {suggested}U</button>
              <button className="btn btn-ghost" onClick={()=>setPhase("different")} style={{color:"#ea580c",borderColor:"rgba(234,88,12,.3)"}}>Dose diferente</button>
              <button className="btn btn-ghost" onClick={()=>{onSkip(carbType);setDone(0);}} style={{color:"var(--text3)"}}>Não aplicar</button>
            </>
          )}
        </div>
      </>}

      {phase==="different" && <>
        <p style={{fontSize:"12px",color:"var(--text2)",marginBottom:"10px"}}>Quantas unidades vai aplicar?</p>
        <p style={{fontSize:"11px",color:"var(--text3)",marginBottom:"6px"}}>Os carboidratos calculados ({pendingCarbs||"?"}g) serão mantidos no registro.</p>
        <CarbTypeSelector/>
        <div style={{display:"flex",gap:"8px",alignItems:"center",marginTop:"8px"}}>
          <input value={alt} onChange={e=>setAlt(e.target.value.replace(/[^0-9]/g,""))} autoFocus
            onKeyDown={e=>{if(e.key==="Enter"){const u=parseInt(alt);if(!u||u<=0||u>30)return;onApply(u,carbType);setDone(u);}}}
            placeholder="Ex: 3"
            style={{width:"70px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"10px",padding:"10px",color:"var(--text)",fontSize:"18px",fontFamily:"var(--mono)",textAlign:"center"}}/>
          <button className="btn" onClick={()=>{const u=parseInt(alt);if(!u||u<=0||u>30)return;onApply(u,carbType);setDone(u);}}
            style={{background:"#ea580c",color:"white",flex:1}}>Registrar {alt||"?"}U</button>
          <button className="btn btn-ghost" onClick={()=>setPhase("ask")}>←</button>
        </div>
      </>}
    </div>
  );
}

/* ── CHAT BUBBLE ───────────────────────────────────────────────────────── */
function Bubble({msg, onApplyDose, onUpdateCarbs, totalIOB, pred60}) {
  const isUser = msg.role === "user";
  return (
    <div style={{display:"flex",gap:"8px",alignItems:"flex-end",marginBottom:"14px",flexDirection:isUser?"row-reverse":"row",animation:"fadeIn .2s ease"}}>
      {!isUser && (
        <div style={{width:"30px",height:"30px",borderRadius:"50%",background:"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",flexShrink:0,boxShadow:"0 2px 8px rgba(14,165,233,.3)"}}>💉</div>
      )}
      <div style={{maxWidth:"82%",minWidth:"60px"}}>
        {msg.images?.length>0 && (
          <div style={{display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"6px",justifyContent:isUser?"flex-end":"flex-start"}}>
            {msg.images.map((src,i)=><img key={i} src={src} alt="" style={{height:"80px",borderRadius:"10px",objectFit:"cover"}}/>)}
          </div>
        )}
        {msg.content && msg.content!=="(imagem)" && (
          <div style={{
            background: isUser ? "var(--accent)" : "var(--surface)",
            border: isUser ? "none" : "1px solid var(--border)",
            borderRadius: isUser ? "18px 18px 4px 18px" : "18px 18px 18px 4px",
            padding: "11px 15px",
            fontSize: "13.5px",
            lineHeight: "1.6",
            color: isUser ? "white" : "var(--text)",
            boxShadow: "var(--shadow-sm)"
          }}>
            <span dangerouslySetInnerHTML={{__html:renderMD(msg.content)}}/>
          </div>
        )}
        <div style={{fontSize:"10px",color:"var(--text3)",marginTop:"4px",textAlign:isUser?"right":"left",paddingLeft:isUser?0:"6px"}}>
          {msg.time}
        </div>
        {!isUser && msg.suggestedDose!=null && (
          <DoseWidget
            suggested={msg.suggestedDose}
            pendingCarbs={msg.pendingCarbs}

            totalIOB={totalIOB}
            pred60={pred60}
          />
        )}
      </div>
    </div>
  );
}

/* ── HISTORY VIEW ──────────────────────────────────────────────────────── */
function HistoryView({records, onUpdate, onDelete}) {
  const [editId, setEditId] = useState(null);
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const [editMeal, setEditMeal] = useState("");
  const [editCarbs, setEditCarbs] = useState("");
  const [editDose, setEditDose] = useState("");
  const sorted = [...records].reverse();

  const startEdit = r => {
    setEditId(r.id);
    setEditMeal(r.meal||"");
    setEditCarbs(r.carbs!=null?String(r.carbs):"");
    setEditDose(r.appliedDose!=null&&r.appliedDose>0?String(r.appliedDose):"");
  };
  const saveEdit = r => {
    const c = editCarbs !== "" ? parseInt(editCarbs) : r.carbs;
    const d = editDose  !== "" ? parseInt(editDose)  : r.appliedDose;
    const updates = { meal: editMeal.trim()||r.meal };
    if(!isNaN(c) && c >= 0) updates.carbs = c;
    if(!isNaN(d) && d >= 0) updates.appliedDose = d;
    onUpdate(r.id, updates);
    setEditId(null);
  };

  if(!sorted.length) return (
    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"12px",color:"var(--text3)",fontSize:"13px",padding:"40px"}}>
      <span style={{fontSize:"36px"}}>📋</span>Nenhuma refeição ainda.
    </div>
  );
  return (
    <div style={{flex:1,overflowY:"auto",padding:"12px 14px"}}>
      {sorted.map((r,i)=>(
        <div key={r.id||i} className="card" style={{padding:"14px",marginBottom:"8px",animation:"fadeIn .2s ease"}}>
          {editId===r.id ? (
            /* ── Inline edit form ── */
            <div>
              <div style={{fontSize:"11px",color:"var(--accent)",marginBottom:"8px",fontWeight:700}}>✎ Editar registro</div>
              <input value={editMeal} onChange={e=>setEditMeal(e.target.value)}
                placeholder="Descrição da refeição"
                style={{width:"100%",background:"var(--surface2)",border:"1px solid var(--accent)",borderRadius:"8px",padding:"8px 10px",color:"var(--text)",fontSize:"13px",marginBottom:"6px"}}/>
              <div style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:"10px",color:"var(--text3)",marginBottom:"3px",fontWeight:600}}>🍽️ Carboidratos</div>
                  <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                    <input value={editCarbs} onChange={e=>setEditCarbs(e.target.value.replace(/[^0-9]/g,""))}
                      placeholder="—" type="number" inputMode="numeric"
                      style={{width:"80px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"8px",padding:"7px 10px",color:"var(--text)",fontSize:"15px",fontFamily:"var(--mono)",textAlign:"center"}}/>
                    <span style={{fontSize:"11px",color:"var(--text3)"}}>g CHO</span>
                  </div>
                </div>
                {r.appliedDose!=null && r.appliedDose!==undefined && (
                  <div style={{flex:1}}>
                    <div style={{fontSize:"10px",color:"var(--text3)",marginBottom:"3px",fontWeight:600}}>💉 Dose aplicada</div>
                    <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                      <input value={editDose} onChange={e=>setEditDose(e.target.value.replace(/[^0-9]/g,""))}
                        placeholder={r.appliedDose===0?"0":"—"} type="number" inputMode="numeric" min="0" max="30"
                        style={{width:"60px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"8px",padding:"7px 10px",color:"var(--text)",fontSize:"15px",fontFamily:"var(--mono)",textAlign:"center"}}/>
                      <span style={{fontSize:"11px",color:"var(--text3)"}}>U</span>
                    </div>
                  </div>
                )}
              </div>
              <div style={{display:"flex",gap:"8px"}}>
                <button className="btn btn-primary" onClick={()=>saveEdit(r)} style={{flex:1,padding:"7px"}}>Salvar</button>
                <button className="btn btn-ghost" onClick={()=>setEditId(null)} style={{padding:"7px 14px"}}>Cancelar</button>
              </div>
            </div>
          ) : (
            /* ── Normal view ── */
            <>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"8px",alignItems:"flex-start"}}>
                <div style={{fontSize:"13px",fontWeight:700,flex:1,marginRight:"8px",color:"var(--text)"}}>{r.meal||"Refeição"}</div>
                <div style={{display:"flex",gap:"4px",alignItems:"center",flexShrink:0}}>
                  <div style={{fontSize:"10px",color:"var(--text3)",fontFamily:"var(--mono)"}}>{r.datetime}</div>
                  {onUpdate && <button onClick={()=>startEdit(r)}
                    style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:"13px",padding:"0 2px",marginLeft:"4px",opacity:.5,lineHeight:1}}>✎</button>}
                  {onDelete && (confirmDeleteId===r.id ? (
                    <span style={{display:"inline-flex",gap:"4px",alignItems:"center",marginLeft:"4px"}}>
                      <button onClick={()=>{onDelete(r.id);setConfirmDeleteId(null);}}
                        style={{background:"#ef4444",border:"none",borderRadius:"6px",color:"white",cursor:"pointer",fontSize:"10px",fontWeight:700,padding:"2px 7px",lineHeight:1.4}}>apagar</button>
                      <button onClick={()=>setConfirmDeleteId(null)}
                        style={{background:"none",border:"1px solid var(--border)",borderRadius:"6px",color:"var(--text3)",cursor:"pointer",fontSize:"10px",padding:"2px 7px",lineHeight:1.4}}>não</button>
                    </span>
                  ) : (
                    <button onClick={()=>{setEditId(null);setConfirmDeleteId(r.id);}}
                      style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:"14px",padding:"0 2px",marginLeft:"2px",opacity:.4,lineHeight:1}}
                      title="Apagar registro">✕</button>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",gap:"8px",flexWrap:"wrap",fontSize:"11px",fontWeight:500}}>
                {r.carbs!=null && <span style={{background:"rgba(14,165,233,.1)",color:"var(--accent2)",padding:"3px 8px",borderRadius:"6px"}}>🍽️ {r.carbs}g CHO {r.carbType&&r.carbType!=="fast"?CHO_TYPES[r.carbType]?.emoji:""}</span>}
                {r.glucoseBefore!=null && <span style={{background:"var(--surface2)",color:"var(--text2)",padding:"3px 8px",borderRadius:"6px"}}>📊 {r.glucoseBefore} mg/dL</span>}
                {r.suggestedDose!=null && <span style={{background:"rgba(14,165,233,.1)",color:"var(--accent2)",padding:"3px 8px",borderRadius:"6px"}}>💡 sug: {r.suggestedDose}U</span>}
                {r.appliedDose!=null && (
                  <span style={{background:r.appliedDose===0?"var(--surface2)":r.appliedDose===r.suggestedDose?"rgba(22,163,74,.1)":"rgba(234,88,12,.1)",color:r.appliedDose===0?"var(--text3)":r.appliedDose===r.suggestedDose?"#16a34a":"#ea580c",padding:"3px 8px",borderRadius:"6px"}}>
                    {r.appliedDose===0?"⏭️ não aplicado":`✅ ${r.appliedDose}U${r.appliedDose!==r.suggestedDose?" ⚠️":""}`}
                  </span>
                )}
                {r.appliedDose===undefined && <span style={{color:"var(--text3)",fontSize:"11px"}}>⏳ aguardando</span>}
              </div>
            </>
          )}
        </div>
      ))}
    </div>
  );
}

/* ── LIBRARY VIEW ──────────────────────────────────────────────────────── */
function LibraryView({library,onUse,onDelete}) {
  const [showAdd,setShowAdd]=useState(false);
  const [name,setName]=useState(""),[carbs,setCarbs]=useState(""),[desc,setDesc]=useState("");
  const add=()=>{const c=parseInt(carbs);if(!name.trim()||!c||c<=0)return;onUse({saveOnly:true,name:name.trim(),carbs:c,description:desc.trim()});setName("");setCarbs("");setDesc("");setShowAdd(false);};
  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",padding:"12px 14px",overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px",flexShrink:0}}>
        <span style={{fontSize:"13px",fontWeight:600,color:"var(--text2)"}}>Alimentos frequentes</span>
        <button className="btn btn-ghost" onClick={()=>setShowAdd(s=>!s)} style={{fontSize:"12px",padding:"6px 12px"}}>{showAdd?"Cancelar":"+ Adicionar"}</button>
      </div>
      {showAdd && (
        <div className="card" style={{padding:"14px",marginBottom:"12px",flexShrink:0,animation:"fadeIn .2s ease"}}>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Nome do alimento"
            style={{width:"100%",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"10px",padding:"10px 12px",color:"var(--text)",fontSize:"13px",marginBottom:"8px"}}/>
          <div style={{display:"flex",gap:"8px",marginBottom:"10px"}}>
            <input value={carbs} onChange={e=>setCarbs(e.target.value)} placeholder="CHO (g)" type="number" inputMode="numeric"
              style={{width:"110px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"10px",padding:"10px 12px",color:"var(--text)",fontSize:"13px"}}/>
            <input value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Descrição (opcional)"
              style={{flex:1,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"10px",padding:"10px 12px",color:"var(--text)",fontSize:"13px"}}/>
          </div>
          <button className="btn btn-primary" onClick={add} style={{width:"100%"}}>Salvar</button>
        </div>
      )}
      <div style={{flex:1,overflowY:"auto"}}>
        {!library.length && <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"12px",color:"var(--text3)",padding:"40px",fontSize:"13px"}}><span style={{fontSize:"36px"}}>📚</span>Biblioteca vazia.</div>}
        {library.map((item,i)=>(
          <div key={item.id || i} className="card" style={{display:"flex",alignItems:"center",gap:"12px",padding:"12px 14px",marginBottom:"8px"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:"13px",fontWeight:700,color:"var(--text)"}}>{item.name}</div>
              {item.description&&<div style={{fontSize:"11px",color:"var(--text3)",marginTop:"2px"}}>{item.description}</div>}
            </div>
            <div style={{fontSize:"16px",fontWeight:800,color:"var(--accent)",fontFamily:"var(--mono)",flexShrink:0}}>{item.carbs}g</div>
            <button className="btn btn-ghost" onClick={()=>onUse(item)} style={{fontSize:"11px",padding:"5px 12px"}}>Usar</button>
            <button onClick={()=>onDelete(i)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:"16px",padding:"4px",opacity:.5}}>✕</button>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── GLUCOSE CHART — sem stats TIR, com marcadores de dose/refeição ──────── */
function GlucoseChart({glucoseData, history, activeDoses, onRowsUpdate}) {
  const {dark} = useContext(ThemeCtx);
  const [hours,setHours]  = useState(8);
  const [loading,setLoad] = useState(false);
  const [error,setError]  = useState(null);
  const [count,setCount]  = useState(null);
  const [showMarkers, setShowMarkers] = useState(true);
  const showMarkersRef = useRef(true);
  showMarkersRef.current = showMarkers;
  const canvasRef  = useRef(null);
  const chartRef   = useRef(null);
  const rowsRef    = useRef([]);
  const timerRef   = useRef(null);
  const hoursRef   = useRef(hours);
  const historyRef = useRef(history||[]);
  hoursRef.current  = hours;
  historyRef.current = history||[];

  // Força redraw quando showMarkers ou history mudam (plugins leem refs, não re-criam chart)
  useEffect(()=>{
    if(chartRef.current) chartRef.current.update();
  },[showMarkers, history]);

  const targetZonePlugin = {
    id:"tz",
    beforeDraw(chart){
      const{ctx,chartArea:ca,scales:{y}}=chart; if(!ca||!y) return;
      ctx.save();
      ctx.fillStyle = dark ? "rgba(74,222,128,0.06)" : "rgba(22,163,74,0.07)";
      ctx.fillRect(ca.left, y.getPixelForValue(180), ca.width, y.getPixelForValue(70)-y.getPixelForValue(180));
      ctx.setLineDash([4,5]); ctx.lineWidth=1.5;
      [[180, dark?"rgba(74,222,128,.5)":"rgba(22,163,74,.45)"],
       [70,  dark?"rgba(248,113,113,.5)":"rgba(239,68,68,.45)"]].forEach(([v,c])=>{
        const px=y.getPixelForValue(v); ctx.strokeStyle=c;
        ctx.beginPath();ctx.moveTo(ca.left,px);ctx.lineTo(ca.right,px);ctx.stroke();
      });
      ctx.restore();
    }
  };

  // Plugin de marcadores de dose/refeição
  const doseMarkersPlugin = {
    id:"dm",
    afterDraw(chart){
      if(!showMarkersRef.current) return;
      const{ctx,chartArea:ca,scales:{x,y}}=chart; if(!ca||!x||!y) return;
      const rows    = rowsRef.current;
      const history = historyRef.current;
      if(!rows.length || !history.length) return;
      const windowMs = hoursRef.current * 3600000;
      const since    = Date.now() - windowMs;

      history
        .filter(r => r.appliedAt && (r.appliedDose > 0 || (r.appliedDose === 0 && r.carbs)) && r.appliedAt >= since)
        .forEach(record => {
          const px = x.getPixelForValue(record.appliedAt);
          if(px < ca.left || px > ca.right) return;

          // Find nearest real glucose value at this timestamp (for hairline anchor)
          let nearestY = null, minDiff = Infinity;
          rows.forEach(r => {
            const diff = Math.abs(new Date(r.captured_at).getTime() - record.appliedAt);
            if(diff < minDiff){ minDiff=diff; nearestY=r.value; }
          });
          const pyAnchor = nearestY != null && minDiff < 20*60000
            ? y.getPixelForValue(nearestY)
            : ca.bottom;

          ctx.save();
          // Hairline: from label bottom to data point on curve (sem dot)
          const labelBottom = ca.top + (record.carbs ? 30 : 18);
          ctx.strokeStyle = dark ? "rgba(56,189,248,.25)" : "rgba(2,100,180,.55)";
          ctx.lineWidth = 0.75;
          ctx.setLineDash([]);
          ctx.beginPath();
          ctx.moveTo(px, labelBottom);
          ctx.lineTo(px, pyAnchor);
          ctx.stroke();
          // Labels
          ctx.font = "bold 10px Outfit, sans-serif";
          ctx.textAlign = "center";
          if(record.appliedDose > 0) {
            ctx.fillStyle = dark ? "rgba(56,189,248,.9)" : "rgba(2,132,199,.9)";
            ctx.fillText(`💉${record.appliedDose}U`, px, ca.top + 12);
          }
          if(record.carbs) {
            ctx.fillStyle = dark ? "rgba(22,163,74,.85)" : "rgba(22,163,74,.9)";
            ctx.fillText(`🍽️${record.carbs}g`, px, ca.top + (record.appliedDose > 0 ? 24 : 12));
          }
          ctx.restore();
        });
    }
  };

  // Prediction curve — solid purple dashed line + uncertainty band
  const makePredCurvePlugin = (predPoints, dark) => ({
    id:"predCurve",
    afterDatasetsDraw(chart){
      if(predPoints.length < 2) return;
      const{ctx,chartArea:ca,scales:{x,y}}=chart;
      if(!ca||!x||!y) return;
      const pixels = predPoints
        .map(p=>({ px:x.getPixelForValue(p.x), py:y.getPixelForValue(p.y),
                   pyLow: p.low!=null?y.getPixelForValue(p.low):null,
                   pyHigh:p.high!=null?y.getPixelForValue(p.high):null }))
        .filter(p=>p.px>=ca.left-1 && p.px<=ca.right+1);
      if(pixels.length < 2) return;

      const bandPixels = pixels.filter(p=>p.pyLow!=null&&p.pyHigh!=null);
      if(bandPixels.length >= 2){
        ctx.save();
        ctx.beginPath();
        bandPixels.forEach((p,i)=>i===0?ctx.moveTo(p.px,p.pyHigh):ctx.lineTo(p.px,p.pyHigh));
        [...bandPixels].reverse().forEach(p=>ctx.lineTo(p.px,p.pyLow));
        ctx.closePath();
        ctx.fillStyle = dark?"rgba(187,134,252,.08)":"rgba(142,68,173,.07)";
        ctx.fill();
        ctx.restore();
      }

      // 2) Dashed prediction line — solid purple, no gradient
      ctx.save();
      ctx.setLineDash([5,4]);
      ctx.lineWidth = 2;
      ctx.strokeStyle = dark?"rgba(187,134,252,.75)":"rgba(142,68,173,.65)";
      ctx.lineJoin="round"; ctx.lineCap="round";
      ctx.beginPath();
      pixels.forEach((p,i)=>i===0?ctx.moveTo(p.px,p.py):ctx.lineTo(p.px,p.py));
      ctx.stroke();
      ctx.restore();
    }
  });

  const drawChart = useCallback(()=>{
    if(!canvasRef.current||!rowsRef.current.length) return;
    if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}
    const rows   = rowsRef.current;

    // ── Use timestamp as x value (linear scale) for proportional spacing ──
    const rawPoints = rows.map(r=>({
      x: new Date(r.captured_at).getTime(),
      y: r.value,
      trend_text: r.trend_text
    }));

    // Suavização: 3 passes consecutivos do kernel 1-2-1/4
    // Só suaviza dentro de gaps ≤ 12min para não interpolar buracos reais
    // 3 passes ≈ filtro Gaussiano σ~1.5 leituras, suficiente para remover microflutações
    const smooth1pass = pts => pts.map((p, i) => {
      if(i === 0 || i === pts.length - 1) return p;
      const prev = pts[i-1], next = pts[i+1];
      if(p.x - prev.x > 12*60000 || next.x - p.x > 12*60000) return p;
      return {...p, y: (prev.y + 2*p.y + next.y) / 4};
    });
    const smoothed = smooth1pass(smooth1pass(smooth1pass(rawPoints)));
    // Arredonda só no final para evitar acúmulo de erro
    const realPoints = smoothed.map(p => ({...p, y: Math.round(p.y)}));

    // ── Prediction curve — from last real reading ─────────────────────────
    const preds = glucoseData?.glucose && !glucoseData?.error
      ? predictGlucose(glucoseData.glucose, glucoseData.trendEmoji, filterDoses(activeDoses||[]), dark)
      : [];

    // Anchor prediction at the last real data timestamp, not "now"
    // (last captured_at + delta per prediction step)
    const lastTs = realPoints[realPoints.length-1]?.x || Date.now();
    const lastVal = realPoints[realPoints.length-1]?.y;
    const predPoints = preds.length ? [
      {x: lastTs, y: lastVal, low: lastVal, high: lastVal}, // anchor: no uncertainty at t=0
      ...preds.map(p => ({x: lastTs + p.t*60000, y: p.value, low: p.low, high: p.high}))
    ] : [];

    const allY = [...realPoints.map(p=>p.y), ...predPoints.map(p=>p.y)];
    const allX = [...realPoints.map(p=>p.x), ...predPoints.map(p=>p.x)];
    const yMin = Math.min(50, Math.min(...allY)-20);
    const yMax = Math.max(300, Math.max(...allY)+25);
    const xMin = allX[0];
    const xMax = allX[allX.length-1];

    const gridColor  = dark ? "rgba(255,255,255,.05)" : "rgba(0,0,0,.05)";
    const tickColor  = dark ? "rgba(255,255,255,.35)" : "#94a3b8";
    const tooltipBg  = dark ? "rgba(6,26,64,.97)" : "rgba(15,23,42,.95)";

    chartRef.current = new Chart(canvasRef.current.getContext("2d"),{
      type:"line",
      data:{datasets:[
        // Dataset 0 — real glucose (solid, colored by zone)
        {
          data: realPoints,
          backgroundColor:"transparent",
          pointBackgroundColor:"transparent",
          pointRadius:0,
          pointHoverRadius:4,
          pointHoverBackgroundColor: ctx => {
            const v = ctx.parsed?.y ?? 0;
            return v<70?"#ef4444":v<=180?"#16a34a":"#ca8a04";
          },
          borderWidth:2.5,
          tension:0.5,
          cubicInterpolationMode:'monotone',
          fill:false,
          spanGaps:false,
          segment:{
            borderColor: ctx => {
              const v = ctx.p1.parsed.y;
              return v<70
                ? (dark?"rgba(248,113,113,.9)":"rgba(239,68,68,.8)")
                : v<=180
                  ? (dark?"rgba(74,222,128,.8)":"rgba(22,163,74,.7)")
                  : (dark?"rgba(250,204,21,.85)":"rgba(202,138,4,.85)");
            }
          }
        }
        // Prediction drawn by predCurvePlugin (gradient canvas, dashed)
      ]},
      options:{
        responsive:true, maintainAspectRatio:false, animation:{duration:400},
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:tooltipBg, borderColor:"rgba(14,165,233,.3)", borderWidth:1,
            titleColor:"rgba(255,255,255,.5)", bodyColor:"#f0f4f8",
            callbacks:{
              title: items => {
                const ms = items[0]?.parsed?.x;
                return ms ? new Date(ms).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}) : "";
              },
              label: c => `${c.parsed.y} mg/dL`,
              afterLabel: c => realPoints[c.dataIndex]?.trend_text || ""
            }
          }
        },
        scales:{
          x:{
            type:"linear",
            min: xMin,
            max: xMax,
            afterBuildTicks: axis => {
              // Gera ticks alinhados em horas cheias dentro da janela
              const stepMs = (hoursRef.current<=8 ? 1 : hoursRef.current<=12 ? 2 : 3) * 3600000;
              const firstHour = Math.ceil(xMin / 3600000) * 3600000; // hora cheia mais próxima acima do xMin
              axis.ticks = [];
              for(let t = firstHour; t <= xMax; t += stepMs) {
                axis.ticks.push({value: t});
              }
            },
            ticks:{
              color:tickColor,
              maxRotation:0,
              font:{size:10, family:"var(--font)"},
              callback: v => {
                const d = new Date(v);
                return d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}).replace(":00","h");
              }
            },
            grid:{display:false}
          },
          y:{
            min:yMin, max:yMax,
            ticks:{color:tickColor, font:{size:10, family:"var(--font)"},
              callback:v=>v===70?"70↓":v===180?"180↑":String(v)},
            grid:{color:gridColor}
          }
        }
      },
      plugins:[targetZonePlugin, doseMarkersPlugin, makePredCurvePlugin(predPoints, dark)]
    });
  },[dark, glucoseData, activeDoses]);

  const load = useCallback(async h=>{
    const wh=h??hoursRef.current; setLoad(true); setError(null);
    try{
      const since=new Date(Date.now()-wh*3600000).toISOString();
      const res=await fetch(
        `${SUPABASE_URL}/rest/v1/glucose_readings?select=captured_at,value,trend_text&captured_at=gte.${since}&order=captured_at.asc&limit=2000`,
        {headers:{apikey:SUPABASE_KEY,Authorization:`Bearer ${SUPABASE_KEY}`}}
      );
      if(!res.ok) throw new Error(`Supabase ${res.status}`);
      const rows=await res.json(); setCount(rows.length);
      if(!rows.length){rowsRef.current=[];if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}setError("Sem dados no período.");return;}
      // Deduplicate: keep one reading per minute bucket
      const seen = new Set();
      const dedupRows = rows.filter(r => {
        const ms = new Date(r.captured_at).getTime();
        const bucket = Math.round(ms / 60000); // 1-minute buckets
        if(seen.has(bucket)) return false;
        seen.add(bucket); return true;
      });
      setError(null); rowsRef.current=dedupRows;
      if(onRowsUpdate) onRowsUpdate(dedupRows);
      if(timerRef.current) clearTimeout(timerRef.current);
      timerRef.current=setTimeout(drawChart,80);
    }catch(e){setError(e.message);}finally{setLoad(false);}
  },[drawChart]);

  useEffect(()=>{load();return()=>{if(timerRef.current)clearTimeout(timerRef.current);if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}};},[]);
  useEffect(()=>{if(!glucoseData?.glucose||!rowsRef.current.length)return;load(hoursRef.current);},[glucoseData?.glucose]);
  useEffect(()=>{ if(rowsRef.current.length) setTimeout(drawChart,80); },[dark, glucoseData, activeDoses]);

  const show = !loading && !error;

  return (
    <div style={{flex:1,display:"flex",flexDirection:"column",padding:"2px 10px 6px",overflow:"hidden",position:"relative"}}>

      {loading && (
        <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:"10px",color:"var(--text3)"}}>
          <div style={{width:"8px",height:"8px",borderRadius:"50%",background:"var(--accent)",animation:"pulse 1.2s ease-in-out infinite"}}/>
          <span style={{fontSize:"13px"}}>Carregando...</span>
        </div>
      )}
      {!loading&&error&&(
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"10px",color:"#ea580c",fontSize:"12px",textAlign:"center",padding:"20px"}}>
          <span style={{fontSize:"28px"}}>📭</span>{error}
        </div>
      )}

      {/* Pills de janela — em fluxo acima do canvas */}
      <div style={{display:show?"flex":"none",gap:"5px",alignItems:"center",justifyContent:"flex-end",marginBottom:"4px",flexShrink:0}}>
        <button onClick={()=>setShowMarkers(v=>!v)}
          title={showMarkers?"Ocultar marcações":"Mostrar marcações"}
          style={{padding:"3px 8px",borderRadius:"20px",border:`1px solid ${showMarkers?"var(--accent)":"var(--border)"}`,background:showMarkers?"var(--accent)":"var(--surface)",color:showMarkers?"white":"var(--text3)",fontSize:"11px",cursor:"pointer",transition:"all .15s",marginRight:"2px",display:"flex",alignItems:"center",gap:"3px",minHeight:"26px"}}>
          <IcoMarkers s={12} c={showMarkers?"white":"var(--text3)"}/>
          {showMarkers && <span style={{fontSize:"10px"}}>vis</span>}
        </button>
        {[8,12,24].map(h=>(
          <button key={h} onClick={()=>{setHours(h);load(h);}}
            style={{padding:"2px 9px",borderRadius:"20px",border:`1px solid ${hours===h?"var(--accent)":"var(--border)"}`,background:hours===h?"var(--accent)":"var(--surface)",color:hours===h?"white":"var(--text2)",fontWeight:700,fontSize:"10px",cursor:"pointer",fontFamily:"var(--font)",transition:"all .15s"}}>
            {h}h
          </button>
        ))}
        <button onClick={()=>load()} aria-label="Recarregar gráfico"
          style={{padding:"4px 8px",borderRadius:"20px",border:"1px solid var(--border)",background:"var(--surface)",color:"var(--text3)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",minWidth:"30px",minHeight:"26px"}}>
          <IcoRefresh s={13} c="var(--text3)"/>
        </button>
      </div>
      {/* Canvas sempre no DOM — mostra/oculta via display */}
      <div style={{flex:1,position:"relative",minHeight:0,display:show?"block":"none"}}>
        <canvas ref={canvasRef} style={{width:"100%",height:"100%"}}/>
      </div>
      {count!=null&&show&&(
        <div style={{textAlign:"center",fontSize:"10px",color:"var(--text3)",marginTop:"4px",flexShrink:0,fontFamily:"var(--mono)"}}>{count} leituras · últimas {hours}h</div>
      )}
    </div>
  );
}

/* ── SETTINGS CONTEXT ─────────────────────────────────────────────────── */
const SettingsCtx = createContext({ settings: DEFAULT_SETTINGS, setSettings: ()=>{} });

/* ── SETTINGS MODAL ───────────────────────────────────────────────────── */
function SettingsModal({open, onClose}) {
  const {dark} = useContext(ThemeCtx);
  const {settings, setSettings} = useContext(SettingsCtx);

  // Draft como strings para evitar congelamento de inputs controlados
  const toStr = (s) => ({
    ...s,
    isf:         String(s.isf),
    corrTarget:  String(s.corrTarget),
    corrPostMeal:String(s.corrPostMeal),
    icrRanges:   s.icrRanges.map(r=>({...r, icr:String(r.icr)})),
  });
  const [draft, setDraft] = useState(()=>toStr(settings));
  const [adding, setAdding] = useState(false);
  const [newRange, setNewRange] = useState({start:"06:00",end:"18:00",icr:"5"});
  const [addErr, setAddErr] = useState("");

  useEffect(()=>{
    if(open){ setDraft(toStr(settings)); setAdding(false); setAddErr(""); setNewRange({start:"06:00",end:"18:00",icr:"5"}); }
  },[open]);

  const updRange = (id, key, val) =>
    setDraft(d=>({...d, icrRanges:d.icrRanges.map(r=>r.id===id?{...r,[key]:val}:r)}));

  const delRange = (id) => {
    if(draft.icrRanges.length<=1) return;
    setDraft(d=>({...d, icrRanges:d.icrRanges.filter(r=>r.id!==id)}));
  };

  const confirmAdd = () => {
    const icr = parseInt(newRange.icr);
    if(newRange.start===newRange.end) return setAddErr("Início e fim iguais");
    if(isNaN(icr)||icr<1||icr>30) return setAddErr("ICR: valor entre 1 e 30");
    setDraft(d=>({...d, icrRanges:[...d.icrRanges,{...newRange,icr:String(icr),id:Date.now().toString()}]}));
    setAdding(false); setAddErr(""); setNewRange({start:"06:00",end:"18:00",icr:"5"});
  };

  const save = () => {
    if(!draft.icrRanges.length) return;
    const saved = {
      ...draft,
      isf:          parseFloat(draft.isf)||30,
      corrTarget:   parseFloat(draft.corrTarget)||110,
      corrPostMeal: parseFloat(draft.corrPostMeal)||160,
      icrRanges:    draft.icrRanges.map(r=>({...r, icr:parseInt(r.icr)||5})),
    };
    appSettings = saved;
    setSettings(saved);
    lsSet(KEY_SETTINGS, saved);
    onClose();
  };

  // Select de horário: opções a cada 30min (00:00–23:30)
  const timeOpts = [];
  for(let h=0;h<24;h++) for(let m of [0,30])
    timeOpts.push(`${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}`);

  const timeSelect = (val, onChange) => (
    <select value={val} onChange={e=>onChange(e.target.value)}
      style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"8px",
        padding:"8px 6px",color:"var(--text)",fontSize:"14px",fontFamily:"var(--mono)",
        flex:1,touchAction:"manipulation",cursor:"pointer"}}>
      {timeOpts.map(t=><option key={t} value={t}>{t}</option>)}
    </select>
  );

  const icrInput = (val, onChange) => (
    <input type="text" inputMode="numeric" value={val}
      onChange={e=>onChange(e.target.value.replace(/[^0-9]/g,""))}
      style={{width:"48px",background:"var(--surface2)",border:"1px solid var(--border)",
        borderRadius:"8px",padding:"8px 4px",color:"var(--text)",fontSize:"16px",
        fontFamily:"var(--mono)",textAlign:"center",touchAction:"manipulation"}}/>
  );

  const numInput = (draftKey, min, max) => (
    <input type="text" inputMode="numeric" value={draft[draftKey]}
      onChange={e=>setDraft(d=>({...d,[draftKey]:e.target.value.replace(/[^0-9.]/g,"")}))}
      style={{width:"72px",background:"var(--surface2)",border:"1px solid var(--border)",
        borderRadius:"8px",padding:"7px 10px",color:"var(--text)",fontSize:"16px",
        fontFamily:"var(--mono)",textAlign:"center",touchAction:"manipulation"}}/>
  );

  const numField = (label, key, unit) => (
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
      padding:"11px 0",borderBottom:"1px solid var(--border)"}}>

/* ── FAB / DOSE AVULSA ────────────────────────────────────────────────── */
function FAB({onRegisterDose, totalIOB, pred60, open, onClose}) {
  const {dark} = useContext(ThemeCtx);
  const [dose,setDose]=useState(""),[note,setNote]=useState("");
  const sub=()=>{const u=Math.round(parseFloat(dose));if(!u||u<=0||u>50)return;onRegisterDose(u,note||"Dose avulsa");setDose("");setNote("");onClose();};
  const stackingRisk = totalIOB && totalIOB > 2;
  if (!open) return null;
  return (
    <>
      <div style={{position:"fixed",inset:0,zIndex:199,background:"rgba(0,0,0,.35)",backdropFilter:"blur(2px)"}} onClick={onClose}/>
      <div className="card" style={{position:"fixed",bottom:"calc(var(--bar-h) + 12px)",right:"16px",
        padding:"16px",width:"240px",zIndex:200,boxShadow:"var(--shadow-md)",animation:"fadeIn .18s ease"}}>
        {stackingRisk && (
          <div style={{background:dark?"rgba(239,68,68,.12)":"rgba(254,226,226,.8)",border:"1px solid rgba(239,68,68,.35)",
            borderRadius:"8px",padding:"8px 10px",marginBottom:"12px",fontSize:"11px",color:"#ef4444",lineHeight:1.4}}>
            ⚠️ <strong>IOB alto: {totalIOB}U</strong>{pred60?` · +60min: ${pred60} mg/dL`:""}<br/>
            <span style={{opacity:.8}}>Confirme se nova dose é necessária.</span>
          </div>
        )}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:"12px"}}>
          <div style={{fontSize:"13px",fontWeight:700,color:"var(--accent)",display:"flex",alignItems:"center",gap:"6px"}}>
            <IcoSyringe s={15} c="var(--accent)"/> Dose avulsa
          </div>
          <button onClick={onClose} aria-label="Fechar" style={{background:"none",border:"none",cursor:"pointer",
            color:"var(--text3)",padding:"4px",display:"flex",alignItems:"center",borderRadius:"6px"}}>
            <IcoX s={16} c="var(--text3)"/>
          </button>
        </div>
        <input value={dose} onChange={e=>setDose(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sub()}
          placeholder="Unidades (ex: 4)" type="number" inputMode="numeric" step="1" min="1" max="50"
          style={{width:"100%",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"10px",
            padding:"10px 12px",color:"var(--text)",fontSize:"22px",fontFamily:"var(--mono)",marginBottom:"8px",textAlign:"center"}}/>
        <input value={note} onChange={e=>setNote(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sub()} placeholder="Nota (opcional)"
          style={{width:"100%",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"10px",
            padding:"10px 12px",color:"var(--text)",fontSize:"13px",marginBottom:"12px"}}/>
        <button className="btn btn-primary" onClick={sub} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px",padding:"11px"}}>
          <IcoCheck s={15} c="white"/> Registrar dose
        </button>
      </div>
    </>
  );
}
